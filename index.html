<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Гиюр · Итоговые вопросы курса</title>
</head>
<body>
<style>
:root{
  --bg:#FAFAF6; --surface:#FFFFFF; --ink:#242A3A; --muted:#6B7285; --line:#E4E4DC;
  --accent:#2F5FC0; --accent-ink:#FFFFFF; --accent-soft:#E9EEFA; --track:#ECECE4;
  --gold:#8F6F1F; --gold-soft:#F5EEDC;
  --again:#A8434A; --again-soft:#F7E7E8; --hard:#8A6210; --hard-soft:#F4EBD7;
  --good:#2F5FC0; --good-soft:#E9EEFA; --easy:#3E7D4E; --easy-soft:#E5F0E7;
  --shadow:0 1px 2px rgba(30,38,66,.06),0 6px 24px -12px rgba(30,38,66,.18);
  --serif:ui-serif,'New York',Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,'Helvetica Neue',Arial,sans-serif;
}
@media (prefers-color-scheme: dark){:root{
  --bg:#141824; --surface:#1D2331; --ink:#E8EAF1; --muted:#99A1B5; --line:#2B3245;
  --accent:#8FAEF2; --accent-ink:#10182C; --accent-soft:#232E48; --track:#242B3C;
  --gold:#D2AC5E; --gold-soft:#2E2917;
  --again:#E08A90; --again-soft:#3A2226; --hard:#D9B25F; --hard-soft:#332B15;
  --good:#8FAEF2; --good-soft:#232E48; --easy:#8CC79B; --easy-soft:#1E3024;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px -14px rgba(0,0,0,.6);
}}
:root[data-theme="dark"]{
  --bg:#141824; --surface:#1D2331; --ink:#E8EAF1; --muted:#99A1B5; --line:#2B3245;
  --accent:#8FAEF2; --accent-ink:#10182C; --accent-soft:#232E48; --track:#242B3C;
  --gold:#D2AC5E; --gold-soft:#2E2917;
  --again:#E08A90; --again-soft:#3A2226; --hard:#D9B25F; --hard-soft:#332B15;
  --good:#8FAEF2; --good-soft:#232E48; --easy:#8CC79B; --easy-soft:#1E3024;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px -14px rgba(0,0,0,.6);
}
:root[data-theme="light"]{
  --bg:#FAFAF6; --surface:#FFFFFF; --ink:#242A3A; --muted:#6B7285; --line:#E4E4DC;
  --accent:#2F5FC0; --accent-ink:#FFFFFF; --accent-soft:#E9EEFA; --track:#ECECE4;
  --gold:#8F6F1F; --gold-soft:#F5EEDC;
  --again:#A8434A; --again-soft:#F7E7E8; --hard:#8A6210; --hard-soft:#F4EBD7;
  --good:#2F5FC0; --good-soft:#E9EEFA; --easy:#3E7D4E; --easy-soft:#E5F0E7;
  --shadow:0 1px 2px rgba(30,38,66,.06),0 6px 24px -12px rgba(30,38,66,.18);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
#app{max-width:680px;margin:0 auto;padding:20px 16px 40px}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit;padding:0}
.eyebrow{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600}
.chip{display:inline-block;font-size:11px;letter-spacing:.05em;font-weight:600;padding:2px 9px;border-radius:99px}
.chip.gold{background:var(--gold-soft);color:var(--gold)}
.hdr{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:6px 0 4px}
.hdr h1{font-family:var(--serif);font-size:clamp(15px,calc((100vw - 32px)*0.052),24px);margin:0;font-weight:700;letter-spacing:.01em;white-space:nowrap}
.hdr .sub{color:var(--muted);font-size:13px}
.statline{display:flex;gap:18px;margin:14px 0 18px;padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.stat b{display:block;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.15}
.stat span{font-size:12px;color:var(--muted)}
.stat.due b{color:var(--accent)}
.stat.mature b{color:var(--gold)}
.actions{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.btn{border-radius:13px;padding:14px 18px;font-size:16px;font-weight:600;text-align:center;min-height:48px;transition:transform .06s ease,opacity .15s ease}
.btn:active{transform:scale(.985)}
.btn.primary{background:var(--accent);color:var(--accent-ink)}
.btn.primary small{display:block;font-weight:500;font-size:12.5px;opacity:.85;margin-top:1px}
.btn.secondary{background:var(--surface);border:1px solid var(--line);color:var(--ink)}
.btn:disabled{opacity:.45;cursor:default}
.btn:focus-visible,.rate:focus-visible,.linkbtn:focus-visible,summary:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13.5px;color:var(--muted);margin:0 2px 20px}
.setrow select{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:4px 8px}
.sec-list{display:flex;flex-direction:column;gap:8px}
.sec-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 14px;width:100%;text-align:left;transition:transform .06s ease}
.sec-row:not([disabled]):active{transform:scale(.99)}
.sec-row[disabled]{cursor:default}
.sec-row[disabled] .ssub,.sec-row[disabled] .chev{opacity:.5}
.sec-row .info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.sec-row .name{font-size:14.5px;font-weight:600}
.sec-row .ssub{font-size:12px;color:var(--muted)}
.sec-row .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none}
.sec-row .cnt{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.sec-row .chev{flex:none;width:8px;height:8px;border-right:1.6px solid var(--muted);border-bottom:1.6px solid var(--muted);transform:rotate(-45deg)}
.sec-row:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.sec-head{margin:0 2px 8px}
.bar{width:86px;height:6px;background:var(--track);border-radius:99px;overflow:hidden;display:flex}
.bar i{display:block;height:100%}
.bar .m{background:var(--gold)}
.bar .y{background:var(--accent);opacity:.55}
.foot{margin-top:26px;font-size:12.5px;color:var(--muted);text-align:center}
.foot .linkbtn{color:var(--muted);text-decoration:underline;text-underline-offset:3px;font-size:12.5px}
.byline{margin-top:16px;font-size:12px;color:var(--muted);letter-spacing:.02em}
.byline a{color:var(--muted);text-decoration:underline;text-underline-offset:3px}
.byline a:hover{color:var(--accent)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.linkbtn{color:var(--accent);font-weight:600;font-size:14px}
.progress{flex:1;height:4px;background:var(--track);border-radius:99px;overflow:hidden;margin:0 4px}
.progress i{display:block;height:100%;background:var(--accent);transition:width .2s ease}
.counter{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:22px 20px 24px;margin-bottom:14px}
.card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.card .q{font-family:var(--serif);font-size:22px;line-height:1.4;font-weight:600;text-wrap:balance;margin:0}
.answer{border-top:1px solid var(--line);margin-top:18px;padding-top:16px}
.answer .a{font-size:16.5px;font-weight:600;line-height:1.55;margin:0 0 10px}
.answer .d{font-size:14.5px;color:var(--muted);margin:10px 0 0}
.answer.personal{border-top-color:var(--gold)}
.heblock{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:12px 0}
.heblock .he{direction:rtl;text-align:right;font-size:22px;line-height:1.75;font-weight:500}
.heblock .tr{font-style:italic;color:var(--muted);font-size:14px;margin-top:8px}
.heblock .ru{font-size:14px;margin-top:6px}
.ratebar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
.ratebar .inner{max-width:680px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ratebar .inner.single{grid-template-columns:1fr}
.rate{border-radius:12px;padding:9px 4px;font-size:14.5px;font-weight:700;min-height:52px;transition:transform .06s ease}
.rate:active{transform:scale(.97)}
.rate small{display:block;font-weight:500;font-size:11.5px;opacity:.75;font-variant-numeric:tabular-nums}
.rate.again{background:var(--again-soft);color:var(--again)}
.rate.hard{background:var(--hard-soft);color:var(--hard)}
.rate.good{background:var(--good-soft);color:var(--good)}
.rate.easy{background:var(--easy-soft);color:var(--easy)}
.rate.flip{background:var(--accent);color:var(--accent-ink);font-size:16px}
.studywrap{padding-bottom:96px}
.kbdhint{display:none;text-align:center;color:var(--muted);font-size:12px;margin-top:10px}
@media (min-width:700px){.kbdhint{display:block}}
.done{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:34px 22px;text-align:center}
.done h2{font-family:var(--serif);font-size:24px;margin:0 0 8px}
.done p{color:var(--muted);margin:0 0 20px;font-size:14.5px}
.search{width:100%;font:inherit;font-size:15px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:14px}
.search::placeholder{color:var(--muted)}
details.sec{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
details.sec>summary{list-style:none;display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;font-weight:700;font-size:15px}
details.sec>summary::-webkit-details-marker{display:none}
details.sec>summary .n{color:var(--muted);font-weight:500;font-size:12.5px;margin-left:auto;font-variant-numeric:tabular-nums}
details.sec>summary::before{content:'';width:8px;height:8px;border-right:1.6px solid var(--muted);border-bottom:1.6px solid var(--muted);transform:rotate(-45deg);transition:transform .15s;flex:none}
details.sec[open]>summary::before{transform:rotate(45deg)}
details.qa{border-top:1px solid var(--line)}
details.qa>summary{list-style:none;display:flex;gap:10px;align-items:flex-start;padding:12px 16px;cursor:pointer;font-size:14.5px;line-height:1.45}
details.qa>summary::-webkit-details-marker{display:none}
.dot{flex:none;width:8px;height:8px;border-radius:99px;background:var(--track);margin-top:6px}
.dot.y{background:var(--accent);opacity:.65}
.dot.m{background:var(--gold)}
details.qa .topic{color:var(--muted);font-size:11.5px;display:block;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
details.qa .body{padding:2px 16px 14px 34px;font-size:14px}
details.qa .body .a{font-weight:600;margin:0 0 8px}
details.qa .body .d{color:var(--muted);margin:8px 0 0}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
<div id="app" role="application"></div>
<script>
const DECK = [{"id":"pr01","sec":"Праздники","topic":"Рош ходеш","q":"Что означает термин «рош ходеш»?","a":"«Голова месяца» — новомесячье, первый день каждого еврейского месяца, наступающий с рождением новой луны.","d":"Еврейский календарь лунно-солнечный: месяцы идут по луне, а год выравнивается по солнцу (в високосные годы добавляется второй адар). В древности новый месяц освящал Санхедрин по показаниям свидетелей, видевших молодую луну; сегодня — по рассчитанному календарю. В синагоге в рош ходеш добавляют Халель и Яале ве-яво, а в предшествующий шаббат благословляют наступающий месяц."},{"id":"pr02","sec":"Праздники","topic":"Рош ходеш","q":"Назовите имена нескольких еврейских месяцев.","a":"Нисан, ияр, сиван, тамуз, ав, элул, тишрей, хешван, кислев, тевет, шват, адар.","d":"Всего 12 месяцев (в високосный год — 13: адар I и адар II). Сами названия — вавилонского происхождения, принесены из Вавилонского изгнания. Достаточно уверенно назвать 4–6: например, нисан (Песах), тишрей (Рош ха-Шана и Йом-Кипур), кислев (Ханука), адар (Пурим)."},{"id":"pr03","sec":"Праздники","topic":"Рош ха-Шана","q":"Какова основная заповедь праздника Рош ха-Шана?","a":"Слушать трубление в шофар (бараний рог).","d":"В Торе день назван «зихрон труа» — «память трубления» (Ваикра 23:24). Звуки шофара — ткиа, шварим, труа — пробуждают к тшуве (возвращению, раскаянию) и провозглашают Бога Царём. Рош ха-Шана открывает Десять дней трепета (ямим нораим), завершающиеся Йом-Кипуром."},{"id":"pr04","sec":"Праздники","topic":"Рош ха-Шана","q":"В какой еврейский месяц наступает новый год?","a":"1 тишрея — первый день месяца тишрей (сентябрь–октябрь).","d":"Рош ха-Шана — единственный праздник, который традиционно отмечают два дня даже в Израиле; в реформистских общинах чаще отмечают один день. По традиции в этот день был сотворён человек — поэтому это день суда для всего человечества."},{"id":"pr05","sec":"Праздники","topic":"Рош ха-Шана","q":"Какой месяц был первым в библейские времена?","a":"Нисан — месяц Исхода из Египта: «месяц этот вам — начало месяцев» (Шмот 12:2). Тишрей же — седьмой месяц.","d":"Мишна называет четыре «новых года»: 1 нисана — для отсчёта царств и праздников, 1 элула — для десятины скота, 1 тишрея — для счёта лет, 15 швата — новый год деревьев. Так что счёт месяцев ведётся от нисана, а счёт лет — от тишрея."},{"id":"pr06","sec":"Праздники","topic":"Рош ха-Шана","q":"Какой сейчас еврейский год и с какой даты принято отсчитывать года?","a":"Сейчас 5786 год (лето 2026-го; 12 сентября 2026 наступит 5787-й). Года отсчитывают «от сотворения мира» — по традиции, от сотворения Адама.","d":"Летосчисление вычислено по возрастам и датам, указанным в Танахе. В реформистском (и в целом современном) понимании это символическая точка отсчёта традиции, а не буквальный возраст вселенной — вера и наука здесь не конфликтуют."},{"id":"pr07","sec":"Праздники","topic":"Рош ха-Шана","q":"В чем смысл обряда ташлих?","a":"В первый день Рош ха-Шана приходят к водоёму и символически «выбрасывают» свои грехи в воду — знак решимости освободиться от них.","d":"Название и смысл — из стиха пророка Михи (7:19): «И Ты выбросишь (ве-ташлих) в пучины морские все грехи их». Если первый день выпадает на шаббат, ташлих переносят на второй. Это не магическое избавление, а телесное выражение тшувы."},{"id":"pr08","sec":"Праздники","topic":"Йом-Кипур","q":"Каковы основные запреты Йом-Кипура?","a":"Пять «изнурений»: запрещены еда и питьё, умащение (косметика, кремы), ношение кожаной обуви, омовение ради удовольствия и супружеская близость. Плюс полный запрет работы, как в шаббат.","d":"Пост длится около 25 часов — от заката до выхода звёзд. Источник — «изнуряйте души ваши» (Ваикра 16:29). При угрозе здоровью пост запрещён — жизнь важнее (пикуах нефеш)."},{"id":"pr09","sec":"Праздники","topic":"Йом-Кипур","q":"Как называется молитва, открывающая Йом-Кипур?","a":"Коль Нидрей («Все обеты») — произносится перед заходом солнца в канун дня.","d":"Это арамейская юридическая формула, освобождающая от невыполненных обетов, данных Богу (не от обязательств перед людьми!). Мелодия Коль Нидрей — одна из самых узнаваемых в литургии; по преданию, молитва была особенно значима для анусим — евреев, насильно обращённых в другую веру."},{"id":"pr10","sec":"Праздники","topic":"Йом-Кипур","q":"Как называется молитва, завершающая Йом-Кипур, и почему?","a":"Неила — «запирание врат»: небесные врата молитвы закрываются, это последняя возможность дня. Единственный день в году с пятой молитвой.","d":"Неилу молятся на закате при открытом ковчеге. Завершается она провозглашением «Шма Исраэль», троекратным «Барух шем...», семикратным «Адонай — Ху ха-Элохим» и одним долгим звуком шофара (ткиа гдола)."},{"id":"pr11","sec":"Праздники","topic":"Йом-Кипур","q":"В чем смысл поста в Йом-Кипур?","a":"Освобождение от телесных потребностей ради полной сосредоточенности на душе, тшуве и примирении — на один день человек уподобляется ангелам.","d":"Пост — не самонаказание. Хафтара дня (Йешаягу 58) прямо говорит: истинный пост — «раскрыть оковы зла... разделить хлеб с голодным», то есть пост должен вести к справедливости и милосердию."},{"id":"pr12","sec":"Праздники","topic":"Йом-Кипур","q":"Что за обряд капарот?","a":"Обряд накануне Йом-Кипура: над головой вращают курицу или деньги со словами «это — замена моя, это — искупление моё», после чего курицу или деньги отдают бедным.","d":"Сегодня чаще используют деньги, которые идут на цдаку. Многие законоучители (включая Йосефа Каро) критиковали обряд с курицей; в реформистской практике если он и упоминается, то как народный обычай, суть которого — милосердие перед днём суда."},{"id":"pr13","sec":"Праздники","topic":"Йом-Кипур","q":"Какие прегрешения искупает Йом-Кипур, и что надо делать, чтобы это произошло?","a":"Только прегрешения между человеком и Богом — и только при условии тшувы. Проступки против людей Йом-Кипур не искупает, пока не попросишь прощения у самого человека и не возместишь ущерб.","d":"Это Мишна (Йома 8:9). Тшува включает: признание проступка (видуй), сожаление, исправление причинённого и решение не повторять. Отсюда обычай в дни перед Йом-Кипуром мириться с близкими. Формула традиции: «тшува, тфила и цдака отменяют злой приговор»."},{"id":"pr14","sec":"Праздники","topic":"Суккот","q":"Суккот — один из праздников паломничества (регалим). Сколько их и какие ещё праздники входят в эту группу?","a":"Три праздника паломничества: Песах, Шавуот и Суккот.","d":"«Шалош регалим» — три раза в год во времена Храма поднимались в Иерусалим (Дварим 16:16). Все три соединяют историю Исхода с земледельческим циклом Земли Израиля: Песах — весна и начало жатвы ячменя, Шавуот — жатва пшеницы и первые плоды, Суккот — сбор урожая."},{"id":"pr15","sec":"Праздники","topic":"Суккот","q":"С каким историческим событием связан праздник Суккот?","a":"С Исходом: сорок лет странствий по пустыне, когда народ жил в шалашах под защитой Бога.","d":"«В шалашах поселите... дабы знали поколения ваши, что в шалашах поселил Я сынов Израиля, когда вывел их из земли египетской» (Ваикра 23:42–43). По другому толкованию (рабби Элиэзер), сукка символизирует «облака славы», окружавшие народ в пустыне."},{"id":"pr16","sec":"Праздники","topic":"Суккот","q":"На какие четыре вида растений читают благословения в Суккот?","a":"Арбаат ха-миним: лулав (пальмовая ветвь), этрог (цитрон), адас (мирт) и арава (ива).","d":"Их соединяют вместе — лулав, три ветки мирта и две ивы в связке, этрог отдельно — и благословляют «аль нетилат лулав», покачивая на четыре стороны света, вверх и вниз: Бог повсюду. Источник — Ваикра 23:40."},{"id":"pr17","sec":"Праздники","topic":"Суккот","q":"Что означают четыре вида растений?","a":"Четыре типа людей: этрог имеет вкус и запах — знание Торы и добрые дела; лулав (финик) — вкус без запаха; мирт — запах без вкуса; ива — ни того, ни другого. Вместе они — единый народ, где каждый нужен.","d":"Другое толкование: этрог — сердце, лулав — позвоночник, мирт — глаза, ива — уста: служить Богу всем существом. Оба мидраша стоит знать — обычно достаточно первого."},{"id":"pr18","sec":"Праздники","topic":"Суккот","q":"Каковы основные заповеди праздника Суккот?","a":"Жить (как минимум есть) в сукке семь дней, благословлять четыре вида растений и радоваться празднику.","d":"«Ве-самахта бе-хагеха» — «и радуйся в праздник твой» (Дварим 16:14): Суккот называют «зман симхатейну», время нашей радости. Седьмой день — Ошана Раба, за ним Шмини Ацерет и Симхат Тора."},{"id":"pr19","sec":"Праздники","topic":"Суккот","q":"Какой смысл сидения в шалаше?","a":"Память об Исходе и о том, что защита — от Бога, а не от прочных стен: сукка учит доверию, скромности и благодарности.","d":"Даже владелец прочного дома выходит во временное жилище — все равны перед небом. Крыша (схах) из растений должна пропускать взгляд к звёздам. Это и праздник урожая: радость изобилия соединена с памятью о хрупкости."},{"id":"pr20","sec":"Праздники","topic":"Симхат Тора","q":"Чему радуются в праздник Симхат Тора?","a":"Завершению годового цикла чтения Торы и немедленному началу нового: Тора не заканчивается никогда.","d":"Название — «Радость Торы». В Израиле совпадает со Шмини Ацерет (22 тишрея). Радость именно в том, что учение — вечный круг: закончив последнюю букву, тут же читают первую."},{"id":"pr21","sec":"Праздники","topic":"Симхат Тора","q":"Как радость Симхат Торы проявляется в синагоге?","a":"Акафот: все свитки Торы вынимают из ковчега и семь раз обходят синагогу с танцами и песнями; к Торе стараются вызвать всех.","d":"Дети идут с флажками, их благословляют все вместе под талитом (коль ха-неарим). В эгалитарных общинах в танцах и алиёт равно участвуют мужчины и женщины."},{"id":"pr22","sec":"Праздники","topic":"Симхат Тора","q":"Что особенного в чтении Торы в Симхат Тора?","a":"Читают последнюю главу Торы «Ве-зот ха-браха» (конец Дварим) и сразу же — начало книги Берешит.","d":"Вызванных на эти чтения почётно называют «хатан Тора» (жених Торы) и «хатан Берешит» (в эгалитарных общинах также «калат Тора» — невеста Торы). Это единственный день, когда цикл замыкается на глазах общины."},{"id":"pr23","sec":"Праздники","topic":"Ханука","q":"С какими историческими событиями связана Ханука?","a":"С восстанием Маккавеев (167–164 до н.э.) против власти Селевкидов: Антиох IV запретил иудаизм и осквернил Храм; Йехуда Маккаби освободил Иерусалим, Храм очистили и заново освятили.","d":"«Ханука» означает «освящение». По талмудической легенде, в Храме нашли один кувшинчик ритуально чистого масла — на день, а горело оно восемь дней. Отсюда восемь дней праздника с 25 кислева. Исторически это также победа за право быть евреями — первый в истории случай борьбы за свободу вероисповедания."},{"id":"pr24","sec":"Праздники","topic":"Ханука","q":"Упоминается ли Ханука в Танахе?","a":"Нет — события произошли уже после завершения библейского канона.","d":"История описана в Книгах Маккавеев, которые не вошли в Танах (сохранились в греческом переводе), и у Иосифа Флавия. Чудо с маслом приводится в Талмуде (Шаббат 21б). Поэтому Ханука — праздник постбиблейский, установленный мудрецами."},{"id":"pr25","sec":"Праздники","topic":"Ханука","q":"Какова основная заповедь Хануки?","a":"Зажигание ханукальных свечей — ханукии — ради «пирсумей ниса», обнародования чуда: светильник ставят у окна или у двери, чтобы его видели.","d":"Ханукия — девятисвечник (8 свечей + шамаш), в отличие от храмовой меноры с семью ветвями. Свечами не пользуются для дела — на них только смотрят; для этого и служит вспомогательная свеча шамаш."},{"id":"pr26","sec":"Праздники","topic":"Ханука","q":"Сколько свечей зажигают каждый день Хануки и в каком порядке?","a":"По дому Гилеля прибавляют по одной: в первую ночь — одну, во вторую — две, в восьмую — восемь, плюс шамаш каждый вечер. Свечи ставят справа налево, а зажигают новую первой — слева направо.","d":"Дом Шамая предлагал наоборот — убавлять от восьми к одной; принята практика Гилеля: «в святости прибавляют, а не убавляют». Всего за праздник — 36 свечей (не считая шамаша)."},{"id":"pr27","sec":"Праздники","topic":"Ханука","q":"Что принято есть на Хануку и почему?","a":"Жаренное в масле — в память о чуде с маслом: суфганийот (пончики) и левивот/латкес (картофельные оладьи). Также молочные блюда — в память о Йехудит.","d":"По преданию, Йехудит накормила вражеского военачальника Олоферна солёным сыром, напоила вином и обезглавила его, спасши город. Детям дарят савивон (дрейдл) с буквами «нес гадоль хая по/шам» — «великое чудо было здесь/там» и ханукальные деньги (дмей Ханука)."},{"id":"pr28","sec":"Праздники","topic":"Ту би-Шват","q":"Что означает «Ту» в названии праздника Ту би-Шват?","a":"Число 15, записанное буквами: тет (9) + вав (6). Ту би-Шват — 15-е число месяца шват.","d":"15 не записывают буквами йуд-хей, чтобы не писать сочетание, входящее в Имя Бога. Праздник называют «Рош ха-Шана ла-иланот» — Новый год деревьев (Мишна, Рош ха-Шана 1:1, по дому Гилеля)."},{"id":"pr29","sec":"Праздники","topic":"Ту би-Шват","q":"В чём смысл Ту би-Швата и каковы его традиции в разные исторические периоды?","a":"Изначально — «налоговая» дата: рубеж года для отделения десятин от плодов деревьев. Каббалисты Цфата (XVI в.) создали седер Ту би-Шват с плодами Земли Израиля; сионистская эпоха сделала его днём посадки деревьев; сегодня это ещё и еврейский день экологии.","d":"На седере Ту би-Шват едят плоды, которыми славится Земля Израиля (семь видов: пшеница, ячмень, виноград, инжир, гранат, олива, финик), и пьют четыре бокала — от белого вина к красному, как смена времён года. В Израиле школьники сажают деревья с Керен Кайемет (ККЛ)."},{"id":"pr30","sec":"Праздники","topic":"Пурим","q":"С какими историческими событиями связан Пурим?","a":"Со спасением евреев Персидской империи: сановник Аман задумал истребить всех евреев и бросал жребий («пур») о дате; царица Эстер и её родственник Мордехай сорвали замысел, и день обернулся спасением — 14 адара.","d":"Аман был повешен на дереве, приготовленном для Мордехая. В городах, окружённых стеной со времён Йехошуа бин Нуна — прежде всего в Иерусалиме, — празднуют Шушан-Пурим 15 адара."},{"id":"pr31","sec":"Праздники","topic":"Пурим","q":"В какой книге говорится о событиях Пурима и кто её основные персонажи?","a":"Мегилат Эстер (Свиток Эстер, входит в Ктувим). Персонажи: Эстер, Мордехай, злодей Аман, царь Ахашверош и царица Вашти.","d":"Особенность книги: имя Бога в ней не упомянуто ни разу — чудо «скрыто» в цепочке событий (само имя Эстер созвучно «хестер» — сокрытие). Отсюда и карнавальная тема масок: истинное скрыто за видимым."},{"id":"pr32","sec":"Праздники","topic":"Пурим","q":"Каковы основные заповеди Пурима?","a":"Четыре: чтение Мегилат Эстер (вечером и утром), мишлоах манот — посылка угощений друзьям, матанот ла-эвьоним — подарки бедным (минимум двум) и праздничная трапеза.","d":"При чтении Мегилы имя Амана заглушают трещотками. Обычаи: маскарад, печенье озней Аман («уши Амана», хоменташен). Мишлоах манот — минимум два вида еды одному человеку; смысл заповедей — единство и забота, противоположность словам Амана «есть один народ, рассеянный и разобщённый»."},{"id":"pr33","sec":"Праздники","topic":"Песах","q":"С какими историческими событиями связан Песах?","a":"С Исходом из Египта — освобождением народа из рабства: десять казней, выход под предводительством Моше, рассечение моря. Это день рождения еврейского народа.","d":"Празднуется с 15 нисана: в Израиле семь дней (реформистские общины и в диаспоре обычно держат семь), в традиционной диаспоре — восемь. Главный вечер — седер с чтением Агады: «в каждом поколении человек обязан видеть себя, как будто он сам вышел из Египта». Всю неделю не едят квасного (хамец)."},{"id":"pr34","sec":"Праздники","topic":"Песах","q":"Что означает слово «Песах»?","a":"«Миновал, перескочил»: во время последней казни Бог миновал (пасах) дома евреев, помеченные кровью ягнёнка, поражая только первенцев Египта.","d":"Песах — также название пасхальной жертвы (корбан песах), которую приносили и ели в ночь Исхода и затем во времена Храма. Другие имена праздника: Хаг ха-мацот, Зман херутейну (время нашей свободы), Хаг ха-авив (праздник весны)."},{"id":"pr35","sec":"Праздники","topic":"Песах","q":"Что находится на пасхальном блюде и что означают эти компоненты?","a":"Зроа — косточка с мясом, память о пасхальной жертве; бейца — яйцо, праздничная жертва хагига (и символ круговорота жизни); марор и хазерет — горькая зелень, горечь рабства; харосет — смесь яблок, орехов и вина, похожая на глину для кирпичей; карпас — весенняя зелень, которую окунают в солёную воду — слёзы рабства.","d":"Зроа и бейцу не едят, а марор окунают в харосет. На столе также три мацы и солёная вода. В некоторых современных общинах добавляют апельсин (символ включённости женщин и всех «неожиданных» участников) — необязательный, но живой обычай."},{"id":"pr36","sec":"Праздники","topic":"Песах","q":"Что символизирует маца и почему на праздничном столе три мацы?","a":"Маца — «хлеб бедности» и хлеб свободы: тесто не успело закваситься, когда народ спешно выходил из Египта. Три мацы — Коэн, Леви и Исраэль: весь народ вместе.","d":"Среднюю мацу разламывают (яхац), большую половину прячут как афикоман — его ищут дети, и им завершают трапезу. Квасное (хамец) символизирует «раздутость», гордыню; маца — простоту и смирение."},{"id":"pr37","sec":"Праздники","topic":"Песах","q":"Какое число повторяется в пасхальной Агаде?","a":"Четыре: четыре бокала вина, четыре вопроса («Ма ништана»), четыре сына.","d":"Четыре бокала — по четырём глаголам избавления (Шмот 6:6–7): «выведу, избавлю, спасу, возьму». Четыре сына — мудрый, нечестивый, простодушный и не умеющий спросить: четыре способа передавать историю разным людям."},{"id":"pr38","sec":"Праздники","topic":"Песах","q":"Кого ждут в конце седера и почему?","a":"Пророка Элиягу: ему наливают отдельный бокал и открывают дверь. Элиягу — вестник Машиаха, символ надежды на полное избавление.","d":"Пятый бокал соответствует пятому глаголу — «и приведу вас в землю» (Шмот 6:8): спор о нём мудрецы «оставили до прихода Элиягу». Седер завершают словами «Ле-шана ха-баа б-Ирушалаим» — «В будущем году — в Иерусалиме» (в Израиле добавляют: «в отстроенном»)."},{"id":"pr39","sec":"Праздники","topic":"Йом ха-Шоа","q":"Когда и где произошёл Холокост (Шоа)?","a":"В 1933–1945 годах, в нацистской Германии и оккупированной ею Европе: систематическое уничтожение около шести миллионов евреев, среди них полтора миллиона детей.","d":"Этапы: лишение прав (Нюрнбергские законы), Хрустальная ночь (1938), гетто, массовые расстрелы айнзацгрупп (Бабий Яр), лагеря смерти — Аушвиц, Треблинка, Собибор. День памяти в Израиле — Йом ха-Шоа ве-ха-Гвура, 27 нисана, привязан к годовщине восстания Варшавского гетто: страна замирает под звук сирены."},{"id":"pr40","sec":"Праздники","topic":"Йом ха-Шоа","q":"Можно ли верить в Бога после Катастрофы?","a":"Личный вопрос — единого ответа в иудаизме нет, и честно начать именно с этого. Дальше — твоя позиция.","d":"Возможные опоры: зло совершили люди — свобода выбора означает, что Бог не отменяет человеческих решений; традиция «хестер паним» — сокрытия лика; Бог был со страдающими, а не с палачами. Эмиль Факенхайм говорил о «614-й заповеди»: не даровать Гитлеру посмертных побед — остаться евреями. Для многих ответ — сама еврейская жизнь: память, дети, Израиль, тикун олам. Сформулируй 2–3 своих предложения.","p":true},{"id":"pr41","sec":"Праздники","topic":"Йом ха-Зикарон и Йом ха-Ацмаут","q":"Как и когда отмечают День памяти павших и День независимости Израиля?","a":"Йом ха-Зикарон — 4 ияра: сирены (минута вечером, две утром), вся страна замирает, церемонии на военных кладбищах. Сразу за ним, 5 ияра, — Йом ха-Ацмаут: день провозглашения Государства Израиль (14 мая 1948).","d":"Резкий переход от скорби к празднику — сознательный: цена независимости. Йом ха-Ацмаут: церемония с факелами на горе Герцль, салюты, мангаль, Международный библейский конкурс. В реформистских и религиозно-сионистских общинах читают Халель — праздник имеет и религиозное измерение. Даты сдвигают на день-два, если они соседствуют с шаббатом."},{"id":"pr42","sec":"Праздники","topic":"Йом ха-Зикарон и Йом ха-Ацмаут","q":"Что символизируют флаг, герб и гимн Израиля?","a":"Флаг — белое полотнище с двумя голубыми полосами, как талит, и маген Давидом. Герб — семисвечная менора (по рельефу арки Тита — вернувшаяся домой) с двумя оливковыми ветвями, символом мира, и надписью «Исраэль». Гимн «Ха-Тиква» — «Надежда»: двухтысячелетняя надежда «быть свободным народом на своей земле, земле Сиона и Иерусалима».","d":"Менора с арки Тита — та, что римляне унесли при разрушении Храма: государство «вернуло» её на герб. Оливковые ветви — из видения пророка Зхарьи (гл. 4). Текст «Ха-Тиквы» — Нафтали Герц Имбер, 1878."},{"id":"pr43","sec":"Праздники","topic":"Лаг ба-омер","q":"Что такое счёт омера и сколько дней он длится?","a":"Сфират ха-омер — отсчёт 49 дней (семи недель) от второго дня Песаха до Шавуота; каждый вечер произносят благословение и называют номер дня.","d":"Омер — сноп ячменя нового урожая, который приносили в Храм во второй день Песаха (Ваикра 23:15). Счёт связывает свободу с целью: Исход завершается дарованием Торы на пятидесятый день. Это путь духовной подготовки — от рабства к Синаю."},{"id":"pr44","sec":"Праздники","topic":"Лаг ба-омер","q":"От чего воздерживаются в период счёта омера?","a":"Дни омера — время полутраура: традиционно не играют свадеб, не стригутся, не устраивают веселья с музыкой.","d":"Причина по Талмуду — гибель 24 000 учеников рабби Акивы от мора, «ибо не оказывали уважения друг другу». Обычаи траура различаются по общинам; в реформистской практике соблюдаются мягче, но сам смысл — урок взаимного уважения — сохраняется."},{"id":"pr45","sec":"Праздники","topic":"Лаг ба-омер","q":"Как отмечают Лаг ба-омер сегодня и с какими историческими событиями его связывают?","a":"ЛаГ = 33 (ламед-гимел): 33-й день омера, 18 ияра. В этот день, по традиции, прекратился мор среди учеников рабби Акивы; траур прерывается. Отмечают кострами, свадьбами; это день памяти рабби Шимона бар Йохая — паломничество на гору Мерон.","d":"Рабби Шимону бар Йохаю традиция приписывает книгу «Зоар» — костры символизируют свет его учения. Дети играют с луками и стрелами — память о восстании Бар-Кохбы (132–135 гг.), в котором участвовали ученики рабби Акивы; трёхлетним мальчикам делают первую стрижку (халаке)."},{"id":"pr46","sec":"Праздники","topic":"Шавуот","q":"Почему праздник носит название Шавуот?","a":"Шавуот — «недели»: праздник наступает после отсчёта семи полных недель омера от Песаха, на пятидесятый день (6 сивана).","d":"Семь недель связывают Исход с Синаем: свобода обретает смысл, когда получает Тору. Отсюда греческое название праздника — Пятидесятница."},{"id":"pr47","sec":"Праздники","topic":"Шавуот","q":"Есть ли у Шавуота другие названия? Что они означают?","a":"Да: Зман матан Торатейну — время дарования нашей Торы; Хаг ха-кацир — праздник жатвы (пшеницы); Йом ха-бикурим — день первых плодов; в Талмуде — Ацерет («завершение» Песаха).","d":"Бикурим — первые плоды семи видов Земли Израиля, которые с корзинами приносили в Храм. Названия отражают двойную природу праздника: земледельческую и духовную."},{"id":"pr48","sec":"Праздники","topic":"Шавуот","q":"С каким историческим событием связан Шавуот?","a":"С дарованием Торы на горе Синай — маамад хар Синай, когда народ услышал Десять речений и ответил «наасе ве-нишма» — «сделаем и будем слушать».","d":"Обычаи: тикун лейль Шавуот — учение всю ночь (в Израиле тысячи людей учатся до рассвета и идут к Стене плача), молочная трапеза, украшение синагоги зеленью. Для проходящих гиюр праздник особый: у Синая весь народ как бы «принял иудаизм»."},{"id":"pr49","sec":"Праздники","topic":"Шавуот","q":"Какую книгу читают в Шавуот?","a":"Мегилат Рут — историю моавитянки Рут, которая присоединилась к народу Израиля со словами «народ твой — мой народ, и Бог твой — мой Бог».","d":"Причины: действие происходит во время жатвы; Рут — образец принятия иудаизма по любви, а не по расчёту (традиция видит в ней праобраз гера); её правнук — царь Давид, который, по традиции, родился и умер в Шавуот. Для интервью по гиюру этот ответ стоит знать особенно хорошо."},{"id":"pr50","sec":"Праздники","topic":"9 Ава","q":"Что, по традиции, произошло 9 ава?","a":"Разрушение обоих Храмов: Первого — вавилонянами в 586 г. до н.э., Второго — римлянами в 70 г. н.э. Мишна добавляет: в этот день поколению пустыни было отказано во входе в Землю (грех разведчиков) и пал Бейтар — последняя крепость Бар-Кохбы.","d":"Позднее к дате добавились изгнания из Англии (1290) и Испании (1492). 9 ава стал днём памяти всех национальных катастроф. В 2026 году выпадает на 23 июля."},{"id":"pr51","sec":"Праздники","topic":"9 Ава","q":"Как принято отмечать 9 ава?","a":"Полный пост от заката до заката (как Йом-Кипур — около 25 часов), чтение Мегилат Эйха (Плача Иеремии) и траурных элегий (кинот); сидят на полу или низких скамьях, при входе не приветствуют друг друга.","d":"Посту предшествуют «три недели» от 17 тамуза и особенно «девять дней» ава с траурными ограничениями. Реформистское движение исторически относилось к трауру по Храму сдержанно (восстановления жертвоприношений оно не ждёт), но сегодня 9 ава отмечается как день памяти трагедий еврейской истории и размышления о причинах: Талмуд говорит, что Второй Храм пал из-за беспричинной ненависти (синат хинам)."},{"id":"pr52","sec":"Праздники","topic":"9 Ава","q":"Какие другие посты связаны с разрушением Храма?","a":"17 тамуза — пролом городских стен Иерусалима (начало «трёх недель»); 10 тевета — начало осады Иерусалима Навуходоносором; Цом Гедалья (3 тишрея) — убийство наместника Гедальи, конец еврейского самоуправления после разрушения Первого Храма.","d":"Это «малые» посты — от рассвета до выхода звёзд (в отличие от 9 ава и Йом-Кипура, длящихся с вечера). Все четыре поста перечислены у пророка Зхарьи (8:19) с обещанием, что они обратятся «в радость и весёлые праздники»."},{"id":"dm01","sec":"Еврейский дом","topic":"Мезуза","q":"Как можно отличить еврейский дом?","a":"По мезузе — футляру со свитком, прикреплённому к дверному косяку: справа от входящего, в нижней части верхней трети косяка, с наклоном верхом внутрь (по ашкеназскому обычаю).","d":"Мезузы устанавливают на входной двери и на дверях жилых комнат. Входя и выходя, многие касаются мезузы рукой — напоминание о том, Кому посвящён дом."},{"id":"dm02","sec":"Еврейский дом","topic":"Мезуза","q":"Что находится внутри мезузы и почему?","a":"Пергаментный свиток (клаф) с двумя отрывками из Торы — первыми двумя абзацами Шма (Дварим 6:4–9 и 11:13–21), написанными от руки софером. Именно в этих отрывках дана заповедь: «и напиши их на косяках дома твоего и на вратах твоих».","d":"На обратной стороне свитка — имя Бога Шад-дай, которое толкуют и как аббревиатуру «Шомер длатот Исраэль» — «Страж дверей Израиля». Красивый футляр — лишь оболочка; святость — в свитке."},{"id":"dm03","sec":"Еврейский дом","topic":"Мезуза","q":"С чем связан обряд мезузы?","a":"С заповедью из самой Шма — освятить своё жилище словами о единстве Бога. Мезуза превращает дом в еврейское пространство и напоминает о ценностях на каждом пороге.","d":"Традиция также слышит здесь отзвук ночи Исхода, когда косяки домов были помечены и дома евреев были защищены. Но мезуза — не амулет: защищает не футляр, а жизнь по словам, написанным внутри."},{"id":"dm04","sec":"Еврейский дом","topic":"Шаббат","q":"Какие обряды связаны с наступлением субботы?","a":"Зажигание субботних свечей с благословением (до захода солнца), кабалат шаббат в синагоге, а за столом — кидуш над бокалом вина, омовение рук и благословение на две халы (лехем мишне), праздничная трапеза с субботними песнями.","d":"Две халы — память о двойной порции мана, выпадавшей в пустыне накануне субботы. Принято также благословлять детей и петь «Шалом алейхем», приветствуя субботних ангелов. Свечи зажигают минимум две — «захор» и «шамор», помни и храни."},{"id":"dm05","sec":"Еврейский дом","topic":"Шаббат","q":"Произнесите благословение на зажигание субботних свечей.","a":"Барух Ата Адонай, Элохейну Мелех ха-олам, ашер кидшану бе-мицвотав ве-цивану леадлик нер шель Шаббат.","d":"Обычай: зажечь свечи, закрыть глаза или заслонить их ладонями, произнести благословение и лишь затем взглянуть на огонь — чтобы благословение как бы предшествовало наслаждению светом.","he":[{"h":"בָּרוּךְ אַתָּה יְיָ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, אֲשֶׁר קִדְּשָׁנוּ בְּמִצְוֹתָיו וְצִוָּנוּ לְהַדְלִיק נֵר שֶׁל שַׁבָּת","t":"Барух Ата Адонай, Элохейну Мелех ха-олам, ашер кидшану бе-мицвотав ве-цивану леадлик нер шель Шаббат","r":"Благословен Ты, Господь, Бог наш, Царь вселенной, освятивший нас Своими заповедями и заповедавший нам зажигать субботнюю свечу"}]},{"id":"dm06","sec":"Еврейский дом","topic":"Шаббат","q":"Произнесите благословение на вино.","a":"Барух Ата Адонай, Элохейну Мелех ха-олам, борэ при ха-гафен.","d":"Это благословение открывает кидуш — освящение субботнего дня над бокалом вина, со словами о сотворении мира и об Исходе: суббота — память и о творении, и о свободе.","he":[{"h":"בָּרוּךְ אַתָּה יְיָ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, בּוֹרֵא פְּרִי הַגָּפֶן","t":"Барух Ата Адонай, Элохейну Мелех ха-олам, борэ при ха-гафен","r":"Благословен Ты, Господь, Бог наш, Царь вселенной, сотворивший плод виноградной лозы"}]},{"id":"dm07","sec":"Еврейский дом","topic":"Шаббат","q":"Произнесите благословение на хлеб.","a":"Барух Ата Адонай, Элохейну Мелех ха-олам, ха-моци лехем мин ха-арец.","d":"Произносится над двумя халами после омовения рук. «Выводящий хлеб из земли» — отсылка к псалму 104; благословение на хлеб покрывает всю трапезу.","he":[{"h":"בָּרוּךְ אַתָּה יְיָ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, הַמּוֹצִיא לֶחֶם מִן הָאָרֶץ","t":"Барух Ата Адонай, Элохейну Мелех ха-олам, ха-моци лехем мин ха-арец","r":"Благословен Ты, Господь, Бог наш, Царь вселенной, выводящий хлеб из земли"}]},{"id":"dm08","sec":"Еврейский дом","topic":"Шаббат","q":"Какая церемония завершает субботу и каковы её элементы?","a":"Авдала («разделение») — после выхода звёзд. Четыре элемента: бокал вина; ароматные травы (бсамим); плетёная свеча с несколькими фитилями; заключительное благословение «ха-мавдиль бейн кодеш ле-холь» — «отделяющий святое от будничного».","d":"Ароматы утешают душу, теряющую «дополнительную субботнюю душу» (нешама йетера); огонь — память о первом огне, который, по мидрашу, Адам зажёг на исходе первой субботы. Свечу гасят вином, желают друг другу «шавуа тов» — доброй недели."},{"id":"dm09","sec":"Еврейский дом","topic":"Шаббат","q":"Почему в конце авдалы призывают пророка Элиягу?","a":"Элиягу — вестник Машиаха и грядущего избавления (Малахи 3:23). По традиции он не приходит в шаббат, поэтому с началом новой недели снова поют «Элиягу ха-нави» — пусть избавление наступит уже в эти будни.","d":"Психологически это мост: покидая свет субботы, человек входит в будни не с грустью, а с надеждой. Суббота — «прообраз грядущего мира», и Элиягу напоминает, что мир можно приближать делами."},{"id":"dm10","sec":"Еврейский дом","topic":"Кашрут","q":"Каковы основные принципы кашрута?","a":"Разрешены только определённые виды животных; мясо требует специального убоя (шхиты) и удаления крови; полное разделение мясного и молочного — в еде, посуде и во времени между ними.","d":"Источники — Ваикра 11 и Дварим 14. Кашрут — не гигиена, а дисциплина святости: «освящайте себя и будьте святы». В реформистском иудаизме соблюдение кашрута — область осознанного личного выбора: многие соблюдают полностью или частично (например, не едят свинину и морепродукты, разделяют мясное и молочное дома) — важно, чтобы выбор был информированным."},{"id":"dm11","sec":"Еврейский дом","topic":"Кашрут","q":"Какие виды животных разрешены, а какие запрещены?","a":"Млекопитающие — только жвачные с раздвоенными копытами: корова, овца, коза, олень. Запрещены свинья (копыта есть, жвачки нет), верблюд и заяц (наоборот). Рыба — только с плавниками и чешуёй: запрещены морепродукты, угорь, осётр. Птица — по традиции домашние виды: курица, индейка, утка, гусь, голубь; хищные птицы запрещены.","d":"Запрещены также насекомые, пресмыкающиеся и всё, что от некошерного животного (кроме мёда). Признаки даны в Ваикра 11; для птиц Тора даёт не признаки, а список запрещённых, поэтому едят лишь виды с надёжной традицией."},{"id":"dm12","sec":"Еврейский дом","topic":"Кашрут","q":"Что такое шхита?","a":"Ритуальный убой: обученный специалист (шохет) одним непрерывным движением перерезает трахею и пищевод идеально острым ножом без малейшей зазубрины — животное мгновенно теряет сознание.","d":"Смысл — свести страдание к минимуму: есть мясо разрешено, но убивать можно только с максимальной милостью и никогда — походя. После убоя тушу проверяют на болезни (бдика), затем удаляют кровь высаливанием или прожариванием."},{"id":"dm13","sec":"Еврейский дом","topic":"Кашрут","q":"Почему нельзя есть кровь?","a":"«Ибо душа плоти — в крови» (Ваикра 17:11): кровь — носитель жизни, а жизнь принадлежит Богу. Поэтому кровь полностью удаляют из мяса.","d":"Запрет повторён в Торе многократно — один из самых строгих пищевых запретов. Мясо кошеруют замачиванием и высаливанием (или прожариванием на огне, как печень); даже яйцо с пятнышком крови традиция выбрасывает."},{"id":"dm14","sec":"Еврейский дом","topic":"Кашрут","q":"Как принято трактовать стих «не вари козлёнка в молоке его матери»?","a":"Стих повторён в Торе трижды — отсюда мудрецы вывели три запрета: варить мясное с молочным, есть такую смесь и извлекать из неё выгоду. Это основа полного разделения мясного и молочного.","d":"Шмот 23:19; 34:26; Дварим 14:21. Отсюда — раздельная посуда и ожидание между мясной и молочной пищей (от 1 до 6 часов по разным обычаям). Этическое прочтение: молоко матери — символ жизни, и смешивать его со смертью животного — жестокость; та же логика, что в запрете шхиты матери и детёныша в один день."},{"id":"cz01","sec":"Цикл жизни","topic":"Брит мила","q":"В каком возрасте проводят брит мила?","a":"На восьмой день жизни мальчика, днём — даже если день выпадает на шаббат или праздник.","d":"Источник: «а в день восьмой пусть обрежут крайнюю плоть его» (Ваикра 12:3; Берешит 17:12). Обрезание делает моэль — специалист с медицинской и религиозной подготовкой; младенца во время обряда держит сандак — почётная роль."},{"id":"cz02","sec":"Цикл жизни","topic":"Брит мила","q":"Что делать, если дата брит мила выпадает на субботу или Йом-Кипур?","a":"Если это ровно восьмой день — брит проводят: заповедь обрезания «в срок» сильнее субботы и даже Йом-Кипура. Переносят его только ради здоровья ребёнка.","d":"Если брит был отложен (например, из-за желтухи), то в шаббат или праздник его уже не делают — только в будний день. Здоровье всегда важнее: пикуах нефеш отодвигает всё."},{"id":"cz03","sec":"Цикл жизни","topic":"Брит мила","q":"Кто первым сделал обрезание?","a":"Авраам: он обрезал себя в 99 лет, заключая завет с Богом, а его сын Ицхак стал первым, кого обрезали на восьмой день.","d":"Берешит 17: «Вот завет Мой... обрезан будет у вас всякий мужского пола». Полное название обряда — брит мила, «завет обрезания»: сам обряд и называется словом «союз»."},{"id":"cz04","sec":"Цикл жизни","topic":"Брит мила","q":"Что символизирует обрезание?","a":"Вечный союз (брит) между Богом и народом Израиля, запечатлённый в самом теле, — знак принадлежности к народу завета, который отец передаёт сыну с первых дней жизни.","d":"Знак поставлен на органе продолжения рода: завет передаётся через поколения. При брите мальчик получает еврейское имя. Для мужчины, проходящего гиюр, брит мила — первый из элементов присоединения к этому же завету."},{"id":"cz05","sec":"Цикл жизни","topic":"Брит мила","q":"Какова роль пророка Элиягу в церемонии брит мила?","a":"На каждом брите ставят «кисе шель Элиягу» — кресло Элиягу: по традиции пророк незримо присутствует на каждом обрезании как свидетель верности народа завету.","d":"Элиягу назван «ангелом завета» (Малахи 3:1). По мидрашу, он жаловался, что Израиль оставил завет (Млахим I 19:10), — и получил ответ: будешь приходить на каждый брит и видеть, что завет живёт."},{"id":"cz06","sec":"Цикл жизни","topic":"Брит мила","q":"Что делают при рождении девочки?","a":"Девочку торжественно нарекают именем: в синагоге при чтении Торы (отца или обоих родителей вызывают к Торе и произносят ми-ше-берах) либо на отдельной домашней церемонии — симхат бат или брит бат.","d":"В реформистском иудаизме церемония для девочки — полноценное введение в завет, параллельное бриту по смыслу: свечи, благословения, объяснение выбранного имени. Единого обязательного ритуала нет — семьи выбирают форму."},{"id":"cz07","sec":"Цикл жизни","topic":"Пидьон ха-бен","q":"В каком возрасте делают выкуп первенца?","a":"На 31-й день жизни — после того как мальчику исполнился полный месяц.","d":"Отец «выкупает» сына у коэна за пять серебряных монет (в Израиле чеканят специальные памятные монеты). Если 31-й день выпадает на шаббат или праздник, церемонию переносят на следующий день."},{"id":"cz08","sec":"Цикл жизни","topic":"Пидьон ха-бен","q":"Каковы корни церемонии выкупа первенца?","a":"В ночь Исхода Бог спас еврейских первенцев, и с тех пор «всякий первенец — Мне» (Шмот 13:2): первенцы были посвящены служению. После греха золотого тельца служение перешло к левитам, а первенцев из остальных колен стали символически выкупать.","d":"Бемидбар 3:44–51 описывает первый «обмен» первенцев на левитов; оставшихся выкупили по пять шекелей — отсюда пять монет. Смысл сегодня: первый ребёнок — не «собственность» родителей, жизнь получена как дар."},{"id":"cz09","sec":"Цикл жизни","topic":"Пидьон ха-бен","q":"Кто считается первенцем для выкупа?","a":"Петер рехем — первый сын именно матери, рождённый естественным путём. Выкуп не делают, если отец — коэн или леви, если мать — дочь коэна или леви, а также после кесарева сечения.","d":"Поэтому обряд встречается нечасто. В реформистских общинах его проводят реже и иногда переосмысляют как благодарственную церемонию за первого ребёнка — сына или дочь."},{"id":"cz10","sec":"Цикл жизни","topic":"Бар/бат-мицва","q":"В чём заключается церемония бар/бат-мицвы и в каком возрасте её проводят?","a":"Подростка впервые вызывают к Торе: он читает благословения, отрывок из Торы и обычно хафтару, произносит драшу — своё толкование. Традиционно: мальчики в 13 лет, девочки в 12; в реформистских общинах церемония эгалитарна и чаще проводится в 13 лет для всех.","d":"Бар/бат-мицва — не «получение» статуса через церемонию: совершеннолетие в заповедях наступает по возрасту само, церемония лишь торжественно его отмечает. Подготовка занимает около года — учат чтение Торы с кантилляцией (таамим)."},{"id":"cz11","sec":"Цикл жизни","topic":"Бар/бат-мицва","q":"Что символизирует церемония бар/бат-мицвы?","a":"Религиозное совершеннолетие: «сын/дочь заповеди» — человек сам отвечает за исполнение мицвот, входит в общину полноправным членом, засчитывается в миньян.","d":"Первая публичная алия к Торе — символ вступления в цепь передачи Торы. Отец традиционно произносил благословение «барух ше-птарани» — «освободивший меня от ответственности за него»: ответственность переходит к самому подростку."},{"id":"cz12","sec":"Цикл жизни","topic":"Бар/бат-мицва","q":"Что читает ребёнок в синагоге в ходе бар/бат-мицвы?","a":"Отрывок из недельной главы Торы (или всю главу) и, как правило, хафтару — отрывок из Пророков — с положенными благословениями; часто также ведёт часть службы.","d":"Чтение поют по традиционным знакам кантилляции (таамей ха-микра), выучивая свиток без огласовок. Драша — короткое учение о своей главе — в реформистской традиции обязательная и любимая часть."},{"id":"cz13","sec":"Цикл жизни","topic":"Свадьба","q":"Каковы основные компоненты еврейской свадебной церемонии?","a":"Подписание ктубы при свидетелях; бедекен — жених опускает фату невесты; хупа; кидушин — кольцо со словами посвящения; чтение ктубы; шева брахот — семь благословений над вином; разбивание бокала; ихуд — уединение молодожёнов.","d":"Исторически это две церемонии — эрусин (обручение, кольцо) и нисуин (собственно брак, семь благословений), — объединённые под одной хупой. В реформистской церемонии кольцами и словами посвящения обычно обмениваются оба."},{"id":"cz14","sec":"Цикл жизни","topic":"Свадьба","q":"Какой из компонентов свадьбы наиболее важен?","a":"Кидушин: жених надевает невесте кольцо со словами «Харей ат мекудешет ли бе-табаат зо ке-дат Моше ве-Исраэль» («Вот, ты посвящаешься мне этим кольцом по закону Моше и Израиля») в присутствии двух свидетелей — это и есть юридический момент заключения брака.","d":"Кольцо должно быть простым, без камней — ценность очевидна и неоспорима. В эгалитарной церемонии невеста отвечает своей формулой и кольцом. Без кидушин всё остальное — украшение; без хупы или бокала брак действителен, без посвящения — нет."},{"id":"cz15","sec":"Цикл жизни","topic":"Свадьба","q":"Почему пара стоит под хупой?","a":"Хупа — символ будущего общего дома: крыша есть, а стен нет — дом, открытый гостям с четырёх сторон, как шатёр Авраама и Сары.","d":"Хупа — часто талит, натянутый на четыре шеста. Открытость — это и уязвимость: дом держится не на стенах, а на отношениях и присутствии Шхины. Под хупой звучат семь благословений, соединяющих пару с творением мира и радостью Иерусалима."},{"id":"cz16","sec":"Цикл жизни","topic":"Свадьба","q":"Какова роль ктубы?","a":"Ктуба — брачный договор: документ (традиционно на арамейском), в котором зафиксированы обязательства мужа перед женой — содержание, забота, а также выплаты при разводе или вдовстве. Одна из древнейших форм защиты прав женщины.","d":"Ктубу подписывают два свидетеля, читают под хупой и хранят у жены. В реформистских общинах текст эгалитарен — взаимные обязательства любви, уважения и партнёрства; ктубу часто оформляют как произведение искусства и вешают дома."},{"id":"cz17","sec":"Цикл жизни","topic":"Свадьба","q":"Почему на свадьбе разбивают бокал?","a":"Зехер ле-хурбан — память о разрушении Иерусалимского Храма: даже в высшей радости еврей помнит, что мир ещё не исцелён. «Если забуду тебя, Иерусалим...» (Тхилим 137).","d":"Жених (или оба) разбивает бокал ногой, и все кричат «Мазаль тов!». Дополнительные толкования: хрупкость счастья, которое нужно беречь; необратимость момента, как невозможно склеить стекло. Радость в иудаизме всегда соединена с ответственностью."},{"id":"cz18","sec":"Цикл жизни","topic":"Гиюр","q":"Каковы основные элементы гиюра для мужчины (три) и для женщины (два)?","a":"Для мужчины: брит мила (если обрезан — символическая капля крови, атафат дам брит), твила — погружение в микву, и принятие заповедей (кабалат мицвот) перед бейт-дином. Для женщины: твила и принятие заповедей перед бейт-дином.","d":"Бейт-дин — суд из трёх раввинов/знающих людей, который беседует с кандидатом и удостоверяет искренность выбора. Выйдя из миквы, гер — еврей во всём; Талмуд запрещает напоминать ему о прошлом. Гер получает еврейское имя как сын/дочь Авраама и Сары — бен/бат Авраам авину ве-Сара имену."},{"id":"cz19","sec":"Цикл жизни","topic":"Гиюр","q":"Какой смысл «принятия заповедей» для тебя лично как проходящего гиюр?","a":"Личный вопрос — главный на интервью. Подготовь свой ответ: какие заповеди уже вошли в твою жизнь и как ты понимаешь взятую на себя ответственность.","d":"Канва: 1) принятие заповедей — не разовая декларация, а выбор образа жизни: шаббат, праздники, молитва, кашрут в той мере, которую ты осознанно принял, цдака, учёба; 2) это вступление в общину и её судьбу — «народ твой — мой народ»; 3) реформистский акцент: информированный выбор и постоянный рост — заповеди не механическое исполнение, а осмысленный диалог с традицией. Скажи конкретно: что ты уже делаешь и что обязуешься развивать.","p":true},{"id":"cz20","sec":"Цикл жизни","topic":"Миква","q":"Почему принято погружаться в микву — в древние времена и сегодня?","a":"В древности — для ритуального очищения (таара): перед входом в Храм, после источников тум'а, женщины после нида, а также при гиюре. Сегодня: гиюр, окунание невесты перед свадьбой, нида в традиционных семьях, у некоторых — перед Йом-Кипуром и праздниками.","d":"Миква — природная «живая вода»: источник, или бассейн с дождевой водой. Погружение — полное, без преград. Современные (в т.ч. реформистские) практики добавили погружения на переходах жизни: выздоровление, развод, новые начала. Смысл не гигиена, а символическая смена статуса — «рождение заново»."},{"id":"cz21","sec":"Цикл жизни","topic":"Миква","q":"Ваше мнение о церемонии миквы.","a":"Личный вопрос. Подготовь короткий искренний ответ: что для тебя значит момент погружения при гиюре.","d":"Канва: вода — как чрево и как начало творения; погружение с головой — полная смена статуса, граница между «до» и «после»; выходишь тем же человеком — и новым евреем. Телесный обряд делает внутренний выбор ощутимым и окончательным. Можно добавить, что тебя трогает древность обряда: та же вода соединяет тебя с Рут и с поколениями геров.","p":true},{"id":"cz22","sec":"Цикл жизни","topic":"Траурные обряды","q":"Как принято хоронить человека по еврейской традиции?","a":"Как можно скорее, по возможности в день смерти или назавтра. Хевра кадиша (погребальное братство) совершает таару — омовение — и облачает в тахрихим, простой белый саван: перед смертью все равны. В Израиле хоронят без гроба или в простом деревянном. Скорбящие надрывают одежду (крия).","d":"Тело не оставляют одно до похорон (шмира). Кремация традицией запрещена (тело возвращается земле: «прах ты, и в прах вернёшься»); реформистское движение погребение также предпочитает, хотя кремацию семьям не запрещает. На похоронах — хеспед (прощальное слово), Эль мале рахамим и кадиш."},{"id":"cz23","sec":"Цикл жизни","topic":"Траурные обряды","q":"Каковы основные поминальные молитвы?","a":"Кадиш ятом (кадиш скорбящих), Эль мале рахамим («Бог, полный милосердия») и Изкор — поминальная служба четыре раза в год: в Йом-Кипур, Шмини Ацерет, последний день Песаха и Шавуот.","d":"В годовщину смерти по еврейскому календарю (йорцайт) зажигают 24-часовую свечу и произносят кадиш. В Израиле также Азкара — поминовение в конце шлошим."},{"id":"cz24","sec":"Цикл жизни","topic":"Траурные обряды","q":"О чём говорится в Кадише и как это связано со смертью?","a":"О смерти в кадише нет ни слова: это прославление и освящение Имени Бога — «Итгадаль ве-иткадаш шмей раба» — и просьба о Его царстве и мире. Скорбящий, произнося кадиш, публично утверждает веру и ценность жизни вопреки утрате.","d":"Кадиш написан на арамейском и требует миньяна: община держит скорбящего. По родителям кадиш читают 11 месяцев, затем — каждый йорцайт. Это и психологический якорь: дважды в день человек встаёт среди общины и не остаётся один."},{"id":"cz25","sec":"Цикл жизни","topic":"Траурные обряды","q":"Каковы основные этапы соблюдения траура?","a":"Анинут — от смерти до похорон; шива — семь дней дома (сидят на низком, община приходит утешать и составлять миньян); шлошим — тридцать дней (без праздненств, стрижки, музыки); по родителям — двенадцать месяцев. Далее — йорцайт и Изкор каждый год.","d":"Мудрость системы — в постепенном возвращении к жизни: от полного погружения в скорбь к обычным дням, без подавления горя и без застревания в нём. В шиву принято приносить еду скорбящим и говорить: «Ха-Маком йенахем этхем...» — «Вездесущий утешит вас среди скорбящих Сиона и Иерусалима»."},{"id":"ml01","sec":"Молитва","topic":"Чтение Торы","q":"Когда читают Тору в синагоге?","a":"В шаббат (утром и в минху), по понедельникам и четвергам, в рош ходеш, праздники и посты.","d":"Понедельник и четверг — древние базарные дни: установление приписывают Эзре, чтобы народ не оставался три дня без Торы. В шаббат утром — основное чтение недельной главы с семью вызовами."},{"id":"ml02","sec":"Молитва","topic":"Чтение Торы","q":"Что такое недельная глава (парашат ха-шавуа)?","a":"Тора разделена на 54 главы (парашот); каждую неделю весь еврейский мир читает одну и ту же главу, проходя всю Тору за год.","d":"В обычный год некоторые главы сдваивают. Цикл завершается и тут же начинается заново в Симхат Тора. Общий ритм чтения — то, что соединяет общины по всему миру: в любой синагоге в эту субботу — та же глава."},{"id":"ml03","sec":"Молитва","topic":"Чтение Торы","q":"Назовите названия любых трёх недельных глав.","a":"Например, первые три: Берешит («В начале»), Ноах, Лех-Леха («Иди себе»).","d":"Глава называется по первому значимому слову. Другие известные: Ваера, Толдот, Ваеце, Итро (дарование Торы), Бешалах (рассечение моря), Кдошим («будьте святы»). Хороший ход на интервью — назвать главу своей недели: узнай, какая парашá будет на неделе собеседования."},{"id":"ml04","sec":"Молитва","topic":"Чтение Торы","q":"Как происходит алия ле-Тора (выход к Торе)?","a":"Вызванный поднимается к биме, касается цицит или пояском места чтения и целует его, произносит «Барху эт Адонай ха-меворах» и благословение «ашер бахар бану» («избравший нас»); после чтения — заключительное «ашер натан лану торат эмет» («давший нам Тору истины»).","d":"Сам текст обычно читает баал-крие — чтец; вызванный читает благословения. В шаббат — семь алиёт плюс мафтир, в будни — три. В эгалитарных общинах вызывают и мужчин, и женщин — по имени с именами родителей."},{"id":"ml05","sec":"Молитва","topic":"Чтение Торы","q":"Что такое мафтир?","a":"«Завершающий» — дополнительный вызов к Торе после основных: повторяются последние стихи главы (в праздники — особый отрывок), и именно вызванный на мафтир читает затем хафтару.","d":"Мафтир — мостик между Торой и Пророками. На бар/бат-мицве подростку обычно дают именно мафтир и хафтару."},{"id":"ml06","sec":"Молитва","topic":"Чтение Торы","q":"Из чего сделан свиток Торы?","a":"Из пергамента (клаф) — выделанной кожи кошерного животного; листы сшиты жилами и намотаны на два деревянных валика — «ацей хаим» («деревья жизни»). Текст написан от руки, пером и особыми чернилами, квадратным письмом без огласовок.","d":"В свитке Торы около 305 000 букв; если хотя бы одна буква повреждена, свиток непригоден (пасуль), пока его не исправят. Испорченные свитки не выбрасывают, а хоронят (гениза). Свиток одевают в чехол (меиль), украшают короной и щитом — как царское достоинство."},{"id":"ml07","sec":"Молитва","topic":"Чтение Торы","q":"Какие книги из состава Танаха находятся в свитке Торы?","a":"Только Пятикнижие — Хумаш: Берешит, Шмот, Ваикра, Бемидбар, Дварим.","d":"Пророки и Писания в свиток Торы не входят: хафтару читают из печатного Танаха или отдельного свитка. Отдельными свитками пишут также пять мегилот — прежде всего Мегилат Эстер."},{"id":"ml08","sec":"Молитва","topic":"Чтение Торы","q":"Кто пишет свиток Торы?","a":"Софер СТаМ — специально обученный писец. Аббревиатура СТаМ: Сифрей Тора, Тфилин, Мезузот — три вида священных текстов, которые он пишет.","d":"Работа над свитком занимает около года. Софер пишет с особым намерением (кавана), особенно при написании имён Бога. Дописать последние буквы нового свитка — почёт, который часто разделяет вся община."},{"id":"ml09","sec":"Молитва","topic":"Чтение Торы","q":"За какой период времени в синагоге прочитывают Тору от начала до конца?","a":"За один год — по недельным главам, от Симхат Торы до Симхат Торы.","d":"Это вавилонский (годичный) цикл, принятый почти всеми. В древней Земле Израиля существовал трёхлетний цикл; в некоторых общинах диаспоры (в том числе реформистских) читают треть главы, но по порядку годичного цикла."},{"id":"ml10","sec":"Молитва","topic":"Хафтара","q":"Что такое хафтара?","a":"Отрывок из книг Пророков (Невиим), который читают после чтения Торы; он тематически связан с недельной главой или с особой датой.","d":"Название — от корня «завершать, освобождать». Известная гипотеза о происхождении: во времена гонений Антиоха, когда чтение Торы было запрещено, читали Пророков по мотивам главы; обычай сохранился. У хафтары свои благословения до и после."},{"id":"ml11","sec":"Молитва","topic":"Хафтара","q":"Когда читают хафтару?","a":"В шаббат, праздники и посты — после чтения Торы; читает её вызванный на мафтир.","d":"В особые субботы (перед Пуримом, Песахом, в «три недели») — специальные хафтарот. Например, хафтара Йом-Кипура — Йешаягу 58 о подлинном смысле поста."},{"id":"ml12","sec":"Молитва","topic":"Тфилин","q":"Что такое тфилин?","a":"Две чёрные кожаные коробочки с ремнями, внутри которых — отрывки из Торы: шель яд повязывают на руку напротив сердца, шель рош — на голову.","d":"Исполнение слов Шма: «и повяжи их как знак на руку твою, и да будут они тфилин между глазами твоими». Рука — дела, сердце — чувства, голова — разум: молитва всем существом."},{"id":"ml13","sec":"Молитва","topic":"Тфилин","q":"Когда принято надевать тфилин?","a":"В будние дни на утреннюю молитву (шахарит). В шаббат и праздники тфилин не надевают: эти дни сами — «знак» союза, и второй знак не нужен.","d":"Начинают с бар/бат-мицвы. В реформистском иудаизме тфилин — область личного выбора, и практика возвращается; в эгалитарных общинах тфилин надевают и женщины."},{"id":"ml14","sec":"Молитва","topic":"Тфилин","q":"Что находится внутри тфилин и почему?","a":"Четыре отрывка Торы, написанные софером на пергаменте: два из книги Шмот (Кадеш ли; Ве-хая ки евиаха — об Исходе и посвящении первенцев) и два из Дварим (Шма; Ве-хая им шамоа — о единстве Бога и принятии заповедей).","d":"Именно в этих четырёх отрывках упомянута заповедь «знака на руке и между глазами». В головной коробочке отрывки лежат в четырёх отделениях, в ручной — на одном свитке."},{"id":"ml15","sec":"Молитва","topic":"Талит","q":"Когда надевают талит?","a":"На утреннюю молитву — в будни, шаббат и праздники. Исключение-максимум — Йом-Кипур: талит носят все службы, начиная с Коль Нидрей накануне вечером.","d":"Заповедь цицит — из третьего абзаца Шма (Бемидбар 15): «и увидите её, и вспомните все заповеди Господа». Узлы и обмотки цицит символически кодируют число 613. Есть и талит катан — малый, который носят под одеждой весь день в традиционном мире."},{"id":"ml16","sec":"Молитва","topic":"Талит","q":"Какое благословение говорят перед облачением в талит?","a":"Барух Ата Адонай, Элохейну Мелех ха-олам, ашер кидшану бе-мицвотав ве-цивану леитатеф ба-цицит.","d":"Произносят стоя, затем окутываются талитом с головой на мгновение. Цицит — «зрительная память» заповедей: увидеть и вспомнить.","he":[{"h":"בָּרוּךְ אַתָּה יְיָ אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם, אֲשֶׁר קִדְּשָׁנוּ בְּמִצְוֹתָיו וְצִוָּנוּ לְהִתְעַטֵּף בַּצִּיצִת","t":"Барух Ата Адонай, Элохейну Мелех ха-олам, ашер кидшану бе-мицвотав ве-цивану леитатеф ба-цицит","r":"Благословен Ты, Господь, Бог наш, Царь вселенной, освятивший нас Своими заповедями и заповедавший нам облачаться в цицит"}]},{"id":"ml17","sec":"Молитва","topic":"Талит","q":"Могут ли женщины надевать талит?","a":"В реформистском (и консервативном) иудаизме — да, полностью равноправно: многие женщины молятся в талите, есть и женские дизайны талитов.","d":"В ортодоксии не принято: женщины освобождены от заповедей, привязанных ко времени, и обычай сложился против. Позиция реформизма: заповедь открыта каждому еврею, и осознанное её принятие женщиной только приветствуется."},{"id":"ml18","sec":"Молитва","topic":"Кабалат шаббат","q":"Как называется основной гимн встречи субботы?","a":"«Леха доди» — «Выйди, друг мой, навстречу невесте»: суббота встречается как невеста и царица.","d":"Автор — рабби Шломо Алкабец, каббалист из Цфата (XVI век); первые буквы строф складываются в его имя. Кабалат шаббат как особая служба псалмов и гимна — создание цфатских каббалистов, выходивших встречать субботу в поля."},{"id":"ml19","sec":"Молитва","topic":"Кабалат шаббат","q":"Что принято делать во время последнего куплета «Леха доди» и почему?","a":"На словах «Бои ве-шалом» («Войди с миром...») вся община встаёт, поворачивается к входу и кланяется — встречая входящую царицу-Субботу.","d":"Поворот к дверям (на запад, к заходящему солнцу) — живой театр веры: суббота — гостья, которую встречают лицом. Это одно из самых заметных мест службы — на интервью стоит описать его уверенно."},{"id":"ml20","sec":"Молитва","topic":"Шма Исраэль","q":"Произнесите основное предложение Шма и переведите его.","a":"Шма Исраэль, Адонай Элохейну, Адонай эхад — «Слушай, Израиль: Господь — Бог наш, Господь — один» (Дварим 6:4).","d":"Шёпотом добавляют: «Барух шем квод мальхуто ле-олам ва-эд» — «Благословенно имя славы царства Его во веки веков». Произнося первую строку, принято закрывать глаза ладонью — полная сосредоточенность.","he":[{"h":"שְׁמַע יִשְׂרָאֵל, יְיָ אֱלֹהֵינוּ, יְיָ אֶחָד","t":"Шма Исраэль, Адонай Элохейну, Адонай эхад","r":"Слушай, Израиль: Господь — Бог наш, Господь — один"}]},{"id":"ml21","sec":"Молитва","topic":"Шма Исраэль","q":"Каков смысл Шма?","a":"Это кредо иудаизма — провозглашение единства и единственности Бога. Шма — не просьба, а свидетельство веры, которое еврей произносит утром и вечером.","d":"Три абзаца Шма содержат заповеди любить Бога, учить Торе детей, тфилин, мезузу и цицит. Шма произносят перед сном, ею завершается Йом-Кипур, её слова — последние слова умирающего; с «Шма Исраэль» на устах шли на смерть мученики. Для проходящего гиюр это первые слова, которые стоит знать наизусть."},{"id":"ml22","sec":"Молитва","topic":"Амида","q":"В чём разница между Амидой в будни и в субботу?","a":"Будничная Амида — 19 благословений: три хвалы, тринадцать просьб, три благодарности. В шаббат просьбы убирают — в субботу не просят о будничных нуждах — и заменяют одним благословением освящения дня: получается семь.","d":"Амида («стояние») — центральная молитва каждой службы: её молятся стоя, лицом к Иерусалиму, тихо. Историческое название — Шмоне-эсре, «восемнадцать»: девятнадцатое благословение добавили позже."},{"id":"ml23","sec":"Молитва","topic":"Амида","q":"Сколько благословений в Амиде? Выберите одно, которое вам наиболее близко, и объясните почему.","a":"19 в будни, 7 в шаббат. Выбор благословения — личный: подготовь одно и 2–3 предложения, почему оно твоё.","d":"Удобные варианты: «Хонен ха-даат» — за дар разума и понимания; «Слах лану» — о прощении; «Рефаэну» — об исцелении; «Модим» — благодарность; «Сим шалом» — о мире. Реформистская деталь: в первом благословении наряду с праотцами называют праматерей, а «мехае ха-метим» (оживляющий мёртвых) заменено на «мехае ха-коль» (дающий жизнь всему).","p":true},{"id":"ml24","sec":"Молитва","topic":"Кадиш","q":"Когда произносят Кадиш?","a":"Кадиш разделяет части службы (хаци-кадиш, кадиш шалем), звучит после совместного учения (кадиш де-рабанан), а кадиш ятом — кадиш скорбящих — произносят в конце службы те, кто в трауре или отмечает йорцайт.","d":"Для кадиша нужен миньян — молитвенный кворум из десяти взрослых евреев (в эгалитарных общинах считаются и женщины): освящение Имени — публичный акт."},{"id":"ml25","sec":"Молитва","topic":"Кадиш","q":"На каком языке составлен Кадиш?","a":"На арамейском — разговорном языке евреев эпохи Второго Храма и Талмуда: молитву должен был понимать каждый.","d":"Отсюда узнаваемое звучание: «Итгадаль ве-иткадаш шмей раба...» Финальная строка «Осэ шалом бимромав» — на иврите."},{"id":"ml26","sec":"Молитва","topic":"Кадиш","q":"Каково основное содержание и смысл Кадиша?","a":"Возвеличивание и освящение Имени Бога и просьба о наступлении Его царства и о мире. Смерть в тексте не упоминается вовсе.","d":"«Да возвеличится и освятится великое Имя Его в мире, который Он сотворил по воле Своей...» Смысл кадиша скорбящих — утверждение веры и жизни перед лицом утраты, в кругу общины."},{"id":"ml27","sec":"Молитва","topic":"Биркот ха-шахар","q":"В ходе какой молитвы произносят утренние благословения (биркот ха-шахар)?","a":"В начале шахарит — утренней службы. Это цепочка благодарностей за самое простое: проснуться, видеть, одеться, встать, ходить — за душу и тело.","d":"Среди них: «Элохай нешама» — за чистую душу, возвращённую утром, и «Ашер яцар» — за устройство тела. Исторически каждое благословение сопровождало соответствующее действие пробуждения дома; затем их собрали в начало общей службы."},{"id":"ml28","sec":"Молитва","topic":"Биркот ха-шахар","q":"В чём отличия между реформистским и ортодоксальным вариантом утренних благословений?","a":"В ортодоксальном сидуре есть три «отрицательных» благословения: «...что не создал меня неевреем», «...рабом», «...женщиной» (женщины говорят: «...что создал меня по воле Своей»). Реформистский сидур заменяет их позитивными, одинаковыми для всех: «...что создал меня по образу Своему» (ше-асани бе-цальмо), «...свободным/свободной» (бен/бат хорин), «...евреем/еврейкой» (ше-асани Исраэль).","d":"Смысл замены — достоинство и равенство каждого человека, без определения себя через отрицание другого. Так же поступает и современный консервативный сидур. Это одно из самых наглядных отличий литургии — стоит знать твёрдо."},{"id":"th01","sec":"Танах и история","topic":"Сотворение мира и потоп","q":"Расскажите о сотворении мира по Танаху и о потопе.","a":"Мир сотворён словом Бога за шесть дней, седьмой — шаббат, венец творения; человек создан по образу Божьему (бе-целем Элохим). Адам и Хава изгнаны из Ган Эдена; человечество испортилось, и Бог навёл потоп, спася праведника Ноаха с семьёй и животными в ковчеге. Радуга — знак завета со всем человечеством: потопа больше не будет.","d":"С Ноахом традиция связывает семь заповедей сыновей Ноаха — универсальную мораль для всех народов. Затем — Вавилонская башня и рассеяние. Реформистское понимание: рассказы Берешит — священный текст о смысле (достоинство человека, ответственность за мир, шаббат), а не учебник естественной истории; конфликта с наукой нет."},{"id":"th02","sec":"Танах и история","topic":"Праотцы и праматери","q":"Назовите праотцев и праматерей еврейского народа.","a":"Праотцы: Авраам, Ицхак, Яаков. Праматери: Сара, Ривка, Рахель и Лея.","d":"Авраам и Сара ушли из Ура в Кнаан по призыву «Лех-леха»; с Авраамом заключён завет и дана заповедь обрезания; испытание — акедат Ицхак (связывание Ицхака). Ицхак и Ривка — родители Яакова, который после ночной борьбы получил имя Исраэль («боровшийся с Богом»). Двенадцать сыновей Яакова — родоначальники двенадцати колен; история Йосефа приводит семью в Египет."},{"id":"th03","sec":"Танах и история","topic":"Рабство и Исход","q":"Расскажите о рабстве, Исходе из Египта, Моисее, Аароне и Мирьям.","a":"Потомки Яакова размножились в Египте, и фараон обратил их в рабство, повелев топить новорождённых мальчиков. Моше, спасённый в корзине дочерью фараона, у горящего куста получил призвание вывести народ. После десяти казней — Исход, рассечение моря, дарование Торы на Синае и сорок лет пути в пустыне.","d":"Аарон — старший брат, «уста» Моше перед фараоном, первый первосвященник (коэн гадоль). Мирьям — сестра-пророчица: стерегла младенца Моше у реки, после перехода моря вела женщин в песне с тимпанами; с ней традиция связывает колодец, поивший народ в пустыне."},{"id":"th04","sec":"Танах и история","topic":"Первый Храм","q":"Расскажите о Первом Храме, Давиде и Соломоне.","a":"Царь Давид (~1000 г. до н.э.) объединил колена, сделал Иерусалим столицей и перенёс туда Ковчег Завета; ему традиция приписывает псалмы. Храм построил его сын Шломо (Соломон) — Первый Храм стоял около четырёх веков, пока в 586 г. до н.э. его не разрушил вавилонский царь Невухаднецар. Народ был уведён в Вавилонское изгнание.","d":"Давиду, воевавшему всю жизнь, строительство не было дано — он лишь подготовил его. Шломо славился мудростью (с ним связывают Мишлей, Коэлет, Шир ха-ширим). После его смерти царство раскололось на Северное (Израиль, пало под Ассирией в 722 г. до н.э. — «десять потерянных колен») и Южное (Иудея). Об изгнании — псалом «На реках вавилонских»."},{"id":"th05","sec":"Танах и история","topic":"Второй Храм","q":"Расскажите об эпохе Второго Храма и его разрушении.","a":"В 538 г. до н.э. персидский царь Кир разрешил изгнанникам вернуться; Храм отстроили (515 г. до н.э.), Эзра и Нехемья обновили завет и учение. Позже — эллинизация, восстание Маккавеев, династия Хасмонеев; Ирод грандиозно перестроил Храм. В 70 г. н.э., подавляя Великое восстание, римляне под командованием Тита разрушили Второй Храм — осталась Западная стена (Котель).","d":"В эпоху Второго Храма сложились течения: прушим (фарисеи — предшественники раввинистического иудаизма), цдуким (саддукеи), ессеи. После катастрофы рабан Йоханан бен Закай основал академию в Явне: молитва, учение и добрые дела заняли место жертвоприношений — иудаизм выжил, преобразившись. Талмуд называет причиной разрушения синат хинам — беспричинную ненависть."},{"id":"bk01","sec":"Еврейский книжный шкаф","topic":"Танах","q":"Каковы основные разделы Танаха?","a":"ТаНаХ — аббревиатура трёх разделов: Тора (Пятикнижие), Невиим (Пророки) и Ктувим (Писания). Всего 24 книги.","d":"Невиим: ранние пророки (Йехошуа, Судьи, Шмуэль, Млахим) и поздние (Йешаягу, Ирмиягу, Йехезкель и двенадцать малых). Ктувим: Тхилим (Псалмы), Мишлей, Иов, пять мегилот (среди них Рут, Эстер, Эйха), Даниэль, Эзра-Нехемья, Хроники. Христианский «Ветхий Завет» — те же книги в другом порядке."},{"id":"bk02","sec":"Еврейский книжный шкаф","topic":"Мишна и Талмуд","q":"Мишна и Талмуд: когда написаны и каково их основное содержание?","a":"Мишна — первый письменный свод Устной Торы: галахические положения по всем сферам жизни, отредактирована рабби Йехудой ха-Наси около 200 г. н.э., на иврите, шесть разделов. Талмуд — Мишна плюс Гемара, многовековые обсуждения мудрецов: Иерусалимский Талмуд (~400 г.) и главный, Вавилонский (~500 г.), на арамейском.","d":"Шесть разделов Мишны: Зраим (земледелие и благословения), Моэд (шаббат и праздники), Нашим (брак), Незикин (право), Кодашим (Храм), Тохорот (чистота). Талмуд — не кодекс, а протокол спора: галаха (закон) переплетена с агадой (повествования, этика). «Устная Тора» — живое толкование письменной."},{"id":"bk03","sec":"Еврейский книжный шкаф","topic":"Рамбам","q":"Рамбам: когда жил и какие основные труды написал?","a":"Рабби Моше бен Маймон (Маймонид), 1138–1204: родился в Кордове, бежал от гонений, стал придворным врачом в Египте. Главные труды: «Мишне Тора» — полный кодекс галахи, «Морэ невухим» («Путеводитель растерянных») — философия иудаизма, комментарий к Мишне с 13 принципами веры.","d":"Величайший еврейский философ и законоучитель Средневековья: «От Моше до Моше не было такого, как Моше». Соединил Тору с аристотелевской философией; его 13 принципов легли в основу гимнов «Йигдаль» и «Ани маамин»."},{"id":"bk04","sec":"Еврейский книжный шкаф","topic":"Шульхан арух","q":"«Шульхан арух»: когда и кем написан, каково основное содержание?","a":"Практический кодекс галахи, составленный рабби Йосефом Каро в Цфате и изданный в 1565 году. Четыре раздела: Орах хаим (молитва, шаббат, праздники), Йоре деа (кашрут и др.), Эвен ха-эзер (брак и развод), Хошен мишпат (имущественное право).","d":"Название — «Накрытый стол»: закон, поданный готовым к употреблению. Каро писал по сефардской традиции; рабби Моше Иссерлес (Рама) из Кракова добавил ашкеназские примечания — «Мапа» («Скатерть»). Вместе они стали общепринятым кодексом. Реформистский иудаизм видит в галахе авторитетный голос традиции, но оставляет решение за информированным человеком."},{"id":"bk05","sec":"Еврейский книжный шкаф","topic":"Сидур","q":"Что содержит сидур? В чём отличие реформистского сидура от ортодоксального?","a":"Сидур («порядок») — молитвенник: службы будней, шаббата и праздников, Шма с благословениями, Амида, Халель, кидуш, биркат ха-мазон. Реформистский сидур: эгалитарный язык (праматери рядом с праотцами), позитивные утренние благословения, «мехае ха-коль» вместо «оживляющего мёртвых», сняты молитвы о восстановлении жертвоприношений, иврит рядом с переводом и современными текстами.","d":"Для Грозных дней есть отдельный молитвенник — махзор. Израильские реформистские сидуры: «Ха-авода ше-ба-лев» (1982) и новый «Тфилат ха-адам» (2020, редакторы — раввины Далия Маркс и Алона Лисица), включающий современную израильскую поэзию. Знание названия сидура своей общины на интервью — сильный ход."},{"id":"te01","sec":"Теология и принципы","topic":"Основные понятия","q":"Объясните понятие «Единый Бог».","a":"Монотеизм — сердце иудаизма: Бог один и един, бестелесен, не имеет изображений, Творец и источник всего сущег
