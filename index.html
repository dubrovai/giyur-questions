о. Это провозглашается в Шма: «Господь — Бог наш, Господь — один».","d":"Единство Бога означает и единство мира и морали: нет отдельных «богов» добра и зла, войны и любви. Иудаизм — первый последовательный монотеизм, из которого выросли христианство и ислам."},{"id":"te02","sec":"Теология и принципы","topic":"Основные понятия","q":"Объясните понятия «добро и зло» в иудаизме.","a":"Зло — не самостоятельная космическая сила (в иудаизме нет дьявола-соперника Бога): человек создан с двумя влечениями, йецер ха-тов и йецер ха-ра, и зло в мире — прежде всего результат человеческого выбора.","d":"Йецер ха-ра — не «грех», а энергия желаний (амбиции, страсть), которую нужно направлять: без неё, говорит мидраш, никто не строил бы дом и не растил детей. Ответ иудаизма злу — заповеди, тшува и тикун олам: не объяснить зло, а уменьшать его."},{"id":"te03","sec":"Теология и принципы","topic":"Основные понятия","q":"Объясните понятие «Универсальный Бог».","a":"Бог Израиля — не «племенное божество», а Бог всего мира и всех людей: каждый человек создан по Его образу, завет с Ноахом заключён со всем человечеством.","d":"«Праведники всех народов имеют долю в мире грядущем» — иудаизм не требует, чтобы все стали евреями. Избранность Израиля — это миссия и ответственность («свет народам», Йешаягу 42:6), а не превосходство. Реформизм особо подчёркивает универсальное этическое послание пророков."},{"id":"te04","sec":"Теология и принципы","topic":"Основные понятия","q":"Объясните понятие «свобода выбора».","a":"Человек свободен выбирать между добром и злом и несёт ответственность за выбор: «Жизнь и смерть предложил Я тебе... избери жизнь» (Дварим 30:19).","d":"Формула рабби Акивы: «Всё предвидено, но свобода дана» (Пиркей авот 3:15) — Божье знание не отменяет человеческой свободы. Без свободы выбора не было бы смысла ни в заповедях, ни в тшуве, ни в самом гиюре — который весь построен на свободном выборе."},{"id":"te05","sec":"Теология и принципы","topic":"Основные понятия","q":"Объясните понятие «тикун олам» (исправление мира).","a":"Идея, что человек — партнёр Бога в совершенствовании незавершённого мира: социальная справедливость, милосердие, цдака, ответственность за творение. В реформистском иудаизме — один из центральных принципов.","d":"Источники: молитва Алейну («ле-такен олам бе-мальхут Шаддай» — исправить мир под царством Всемогущего) и каббала Ари — собирание рассеянных искр света. Пиркей авот (2:16): «Не тебе завершить работу, но и не волен ты освободиться от неё»."},{"id":"te06","sec":"Теология и принципы","topic":"Статус женщины","q":"Приведите примеры статуса женщины в реформистском иудаизме.","a":"Полное религиозное равенство: женщины становятся раввинами и канторами, считаются в миньян, вызываются к Торе и ведут службы; носят талит и тфилин по желанию; бат-мицва равна бар-мицве; свадебная церемония эгалитарна — обмен кольцами и взаимные обязательства в ктубе.","d":"Первая женщина-раввин — Регина Йонас (Берлин, 1935, погибла в Аушвице); в США — Салли Призанд (1972); в израильском реформистском движении женщины-раввины ведут десятки общин, среди них редакторы сидура «Тфилат ха-адам» Далия Маркс и Алона Лисица. Женщины полноправны и в руководстве движения."}];
const SECTIONS = [...new Set(DECK.map(c => c.sec))];
const KEY = 'giyur-cards-v1';

let mem = null, storageOk = true;
function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)) || {cards:{}, settings:{newLimit:'all'}}; }
  catch(e){ storageOk = false; return mem || {cards:{}, settings:{newLimit:'all'}}; }
}
function save(s){
  mem = s;
  if(!storageOk) return;
  try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){ storageOk = false; }
}
let S = load();
if(!S.settings) S.settings = {newLimit:'all'};
if(!S.settings.v2){ if(S.settings.newLimit === 15) S.settings.newLimit = 'all'; S.settings.v2 = true; save(S); }

const today = () => Math.floor((Date.now() - new Date().getTimezoneOffset()*60000) / 864e5);
const st = id => S.cards[id];
const isDue = id => { const s = st(id); return s && s.due <= today(); };
const isMature = id => { const s = st(id); return s && s.iv >= 21; };

function counts(){
  const t = today();
  let due=0, fresh=0, mature=0;
  for(const c of DECK){
    const s = st(c.id);
    if(!s) fresh++;
    else { if(s.due <= t) due++; if(s.iv >= 21) mature++; }
  }
  return {due, fresh, mature};
}

const fmtIv = d => { d = Math.round(d); if(d < 1) d = 1; return d < 30 ? d + ' д' : '≈' + Math.round(d/30) + ' мес'; };
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const shuffle = a => { for(let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

let view = 'home';
let session = null;
let shown = false;

function startSession(sec){
  const pool = sec ? DECK.filter(c => c.sec === sec) : DECK;
  const due = pool.filter(c => isDue(c.id)).map(c => c.id);
  const lim = sec ? 'all' : S.settings.newLimit;
  const fresh = shuffle(pool.filter(c => !st(c.id)).map(c => c.id)).slice(0, lim === 'all' ? Infinity : lim);
  session = {queue: shuffle([...due, ...fresh]), total: due.length + fresh.length, done: 0, rev: due.length, fresh: fresh.length, sec: sec || null};
  shown = false;
  view = session.queue.length ? 'study' : 'home';
  render();
}

function rate(grade){
  const id = session.queue[0];
  let s = st(id) || {iv:0, ease:2.5, reps:0, lapses:0, due:0};
  const learning = s.reps === 0 || s.iv === 0;
  const requeue = pos => { session.queue.splice(Math.min(pos, session.queue.length), 0, id); };
  session.queue.shift();
  if(grade === 'again'){
    if(!learning) s.lapses++;
    s.ease = Math.max(1.3, s.ease - 0.2); s.iv = 0;
    requeue(8);
  } else if(grade === 'hard' && learning){
    s.ease = Math.max(1.3, s.ease - 0.15);
    requeue(4);
  } else {
    if(grade === 'hard'){ s.iv = Math.max(s.iv + 1, Math.round(s.iv * 1.2)); s.ease = Math.max(1.3, s.ease - 0.15); }
    if(grade === 'good'){ s.iv = learning ? 1 : Math.max(s.iv + 1, Math.round(s.iv * s.ease)); }
    if(grade === 'easy'){ s.iv = learning ? 3 : Math.max(s.iv + 2, Math.round(s.iv * s.ease * 1.35)); s.ease = Math.min(3, s.ease + 0.15); }
    s.iv = Math.min(s.iv, 365);
    s.reps++; s.due = today() + s.iv;
    session.done++;
  }
  S.cards[id] = s; save(S);
  shown = false;
  if(!session.queue.length) view = 'done';
  render();
}

function resetAll(){
  if(confirm('Сбросить весь прогресс повторений? Карточки останутся, статистика обнулится.')){
    S = {cards:{}, settings:S.settings}; save(S); render();
  }
}

function heBlock(c){
  if(!c.he) return '';
  return c.he.map(l => `<div class="heblock"><div class="he" lang="he">${esc(l.h)}</div><div class="tr">${esc(l.t)}</div><div class="ru">${esc(l.r)}</div></div>`).join('');
}

function homeView(){
  const {due, fresh, mature} = counts();
  const lim = S.settings.newLimit;
  const nNew = lim === 'all' ? fresh : Math.min(lim, fresh);
  const canStudy = due + nNew > 0;
  const secRows = SECTIONS.map(sec => {
    const cs = DECK.filter(c => c.sec === sec);
    const m = cs.filter(c => isMature(c.id)).length;
    const y = cs.filter(c => st(c.id) && !isMature(c.id)).length;
    const sdue = cs.filter(c => isDue(c.id)).length;
    const sfresh = cs.filter(c => !st(c.id)).length;
    const can = sdue + sfresh > 0;
    const ssub = can ? [sdue ? sdue + ' к повторению' : '', sfresh ? sfresh + ' новых' : ''].filter(Boolean).join(' · ') : 'на сегодня всё ✓';
    return `<button class="sec-row" data-action="study-sec" data-sec="${esc(sec)}" ${can ? '' : 'disabled'}><span class="info"><span class="name">${esc(sec)}</span><span class="ssub">${ssub}</span></span><span class="right"><span class="cnt">${m + y}/${cs.length}</span><span class="bar"><i class="m" style="width:${m/cs.length*100}%"></i><i class="y" style="width:${y/cs.length*100}%"></i></span></span><span class="chev"></span></button>`;
  }).join('');
  return `
  <div class="hdr"><h1>Гиюр · Итоговые вопросы курса</h1></div>
  <div class="sub" style="color:var(--muted);font-size:13.5px">Реформистская традиция · Израиль · 5786</div>
  <div class="statline">
    <div class="stat due"><b>${due}</b><span>к повторению</span></div>
    <div class="stat"><b>${fresh}</b><span>новых</span></div>
    <div class="stat mature"><b>${mature}</b><span>выучено</span></div>
  </div>
  <div class="setrow"><label for="newlim">Выбери количество карточек для изучения</label><select id="newlim">
    ${[5,10,15,25,50].map(n => `<option value="${n}" ${lim === n ? 'selected' : ''}>${n}</option>`).join('')}
    <option value="all" ${lim === 'all' ? 'selected' : ''}>все</option>
  </select></div>
  <div class="actions">
    <button class="btn primary" data-action="study" ${canStudy ? '' : 'disabled'}>${canStudy ? 'Заниматься' : 'На сегодня всё ✓'}<small>${canStudy ? due + ' к повторению · ' + nNew + ' новых' : 'загляни завтра - повторения появятся по расписанию'}</small></button>
    <button class="btn secondary" data-action="browse">Посмотреть все карточки и ответы</button>
  </div>
  <div class="eyebrow sec-head">Занятия по разделам</div>
  <div class="sec-list">${secRows}</div>
  <div class="foot">${storageOk ? 'Прогресс хранится в этом браузере и не синхронизируется между устройствами.' : '⚠ Хранилище недоступно, прогресс не переживёт перезагрузку страницы.'}<br><button class="linkbtn" data-action="reset">Сбросить прогресс</button><div class="byline">made by <a href="https://wa.me/qr/OBFHXE2BEIFJO1" target="_blank" rel="noopener">Alexei Dubrovai</a></div></div>`;
}

function studyView(){
  const c = DECK.find(x => x.id === session.queue[0]);
  const s = st(c.id);
  const learning = !s || s.reps === 0 || s.iv === 0;
  const pct = session.total ? session.done / session.total * 100 : 0;
  const sub = {
    again: 'сейчас',
    hard: learning ? 'скоро' : fmtIv(Math.max(s.iv + 1, s.iv * 1.2)),
    good: learning ? '1 д' : fmtIv(Math.max(s.iv + 1, s.iv * s.ease)),
    easy: learning ? '3 д' : fmtIv(Math.max(s.iv + 2, s.iv * s.ease * 1.35))
  };
  const badge = c.p ? '<span class="chip gold">личный ответ</span>' : '';
  const isNew = !s;
  return `<div class="studywrap">
  <div class="topbar"><button class="linkbtn" data-action="home">← Выйти</button><span class="progress"><i style="width:${pct}%"></i></span><span class="counter">${session.done} / ${session.total}</span></div>
  <div class="card">
    <div class="meta"><span class="eyebrow">${esc(c.sec)} · ${esc(c.topic)}</span>${badge}${isNew ? '<span class="chip" style="background:var(--accent-soft);color:var(--accent)">новая</span>' : ''}</div>
    <p class="q">${esc(c.q)}</p>
    ${shown ? `<div class="answer${c.p ? ' personal' : ''}"><p class="a">${esc(c.a)}</p>${heBlock(c)}${c.d ? `<p class="d">${esc(c.d)}</p>` : ''}</div>` : ''}
  </div>
  <div class="kbdhint">${shown ? '1 - снова · 2 - трудно · 3 - хорошо · 4 - легко' : 'пробел - показать ответ'} · esc - выход</div>
  </div>
  <div class="ratebar"><div class="inner${shown ? '' : ' single'}">
  ${shown
    ? `<button class="rate again" data-action="rate" data-g="again">Снова<small>${sub.again}</small></button>
       <button class="rate hard" data-action="rate" data-g="hard">Трудно<small>${sub.hard}</small></button>
       <button class="rate good" data-action="rate" data-g="good">Хорошо<small>${sub.good}</small></button>
       <button class="rate easy" data-action="rate" data-g="easy">Легко<small>${sub.easy}</small></button>`
    : `<button class="rate flip" data-action="flip">Показать ответ</button>`}
  </div></div>`;
}

function doneView(){
  const pool = session.sec ? DECK.filter(c => c.sec === session.sec) : DECK;
  const fresh = pool.filter(c => !st(c.id)).length;
  const scope = session.sec ? `«${esc(session.sec)}» · ` : '';
  const moreBtn = session.sec
    ? `<button class="btn primary" data-action="study-sec" data-sec="${esc(session.sec)}">Ещё новые из раздела</button>`
    : '<button class="btn primary" data-action="study">Ещё новые</button>';
  return `
  <div class="topbar"><button class="linkbtn" data-action="home">← На главную</button></div>
  <div class="done">
    <h2>Занятие завершено</h2>
    <p>${scope}Пройдено карточек: ${session.done}${fresh ? ` · осталось новых: ${fresh}` : ' · все карточки в работе'}</p>
    <div class="actions" style="margin:0">
      ${fresh ? moreBtn : ''}
      <button class="btn secondary" data-action="home">На главную</button>
    </div>
  </div>`;
}

let query = '';
function browseView(){
  const q = query.trim().toLowerCase();
  const match = c => !q || (c.q + ' ' + c.a + ' ' + (c.d||'') + ' ' + c.topic).toLowerCase().includes(q);
  const secs = SECTIONS.map(sec => {
    const cs = DECK.filter(c => c.sec === sec && match(c));
    if(!cs.length) return '';
    const items = cs.map(c => {
      const s = st(c.id);
      const dot = !s ? '' : isMature(c.id) ? ' m' : ' y';
      return `<details class="qa"><summary><span class="dot${dot}"></span><span><span class="topic">${esc(c.topic)}${c.p ? ' · личный ответ' : ''}</span>${esc(c.q)}</span></summary><div class="body"><p class="a">${esc(c.a)}</p>${heBlock(c)}${c.d ? `<p class="d">${esc(c.d)}</p>` : ''}</div></details>`;
    }).join('');
    return `<details class="sec" ${q ? 'open' : ''}><summary>${esc(sec)}<span class="n">${cs.length}</span></summary>${items}</details>`;
  }).join('');
  return `
  <div class="topbar"><button class="linkbtn" data-action="home">← На главную</button></div>
  <input class="search" id="search" type="search" placeholder="Поиск по вопросам и ответам…" value="${esc(query)}">
  ${secs || '<p style="color:var(--muted);text-align:center">Ничего не найдено</p>'}`;
}

const app = document.getElementById('app');
function render(){
  app.innerHTML = view === 'study' ? studyView() : view === 'done' ? doneView() : view === 'browse' ? browseView() : homeView();
  if(view === 'home'){
    const sel = document.getElementById('newlim');
    sel.addEventListener('change', () => { S.settings.newLimit = sel.value === 'all' ? 'all' : +sel.value; save(S); render(); });
  }
  if(view === 'browse'){
    const inp = document.getElementById('search');
    inp.addEventListener('input', () => {
      query = inp.value;
      const pos = inp.selectionStart;
      render();
      const ni = document.getElementById('search');
      ni.focus(); ni.setSelectionRange(pos, pos);
    });
  }
  if(view !== 'study') window.scrollTo(0, 0);
}

app.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const act = el.dataset.action;
  if(act === 'study') startSession();
  if(act === 'study-sec') startSession(el.dataset.sec);
  if(act === 'browse'){ view = 'browse'; query = ''; render(); }
  if(act === 'home'){ view = 'home'; session = null; render(); }
  if(act === 'flip'){ shown = true; render(); window.scrollTo(0, 0); }
  if(act === 'rate') rate(el.dataset.g);
  if(act === 'reset') resetAll();
});

document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') { if(e.key === 'Escape') e.target.blur(); return; }
  if(view === 'study'){
    if(!shown && (e.key === ' ' || e.key === 'Enter')){ e.preventDefault(); shown = true; render(); }
    else if(shown && ['1','2','3','4'].includes(e.key)){ rate(['again','hard','good','easy'][+e.key - 1]); }
    else if(e.key === 'Escape'){ view = 'home'; session = null; render(); }
  } else if(view === 'done' || view === 'browse'){
    if(e.key === 'Escape'){ view = 'home'; render(); }
  }
});

render();
</script>

</body>
</html>
